<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>修改密码 · 品牌沙盘</title>
<style>
:root {
  --bg:#f4f5f9; --card:#fff; --text:#1a1f36; --muted:#697386;
  --border:#e3e8ee; --blue:#0d7aff;
  --font:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
}
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:var(--font); background:var(--bg); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
.card { width:100%; max-width:420px; background:var(--card); border:1px solid var(--border); border-radius:12px; padding:32px; box-shadow:0 8px 24px rgba(15,23,42,.08); }
h1 { font-size:22px; margin-bottom:8px; }
.sub { color:var(--muted); font-size:13px; margin-bottom:24px; line-height:1.6; }
label { display:block; font-size:13px; color:var(--muted); margin-bottom:6px; }
input { width:100%; padding:10px 12px; border:1px solid var(--border); border-radius:8px; font-size:14px; margin-bottom:16px; }
button { width:100%; padding:12px; border:none; border-radius:8px; background:var(--blue); color:#fff; font-size:14px; font-weight:600; cursor:pointer; }
button:disabled { opacity:.6; cursor:not-allowed; }
.err { color:#cd3b32; font-size:13px; min-height:20px; margin-bottom:12px; }
.ok { color:#0e7c4b; font-size:13px; min-height:20px; margin-bottom:12px; }
.back { display:inline-block; margin-top:16px; font-size:13px; color:var(--blue); text-decoration:none; }
</style>
</head>
<body>
<div class="card">
  <h1>修改密码</h1>
  <p class="sub" id="hint">首次登录或管理员重置后，请先设置新密码（至少 8 位，含字母与数字）。</p>
  <div class="err" id="err"></div>
  <div class="ok" id="ok"></div>
  <form id="pwd-form">
    <label for="old_password">当前密码</label>
    <input id="old_password" type="password" autocomplete="current-password" required>
    <label for="new_password">新密码</label>
    <input id="new_password" type="password" autocomplete="new-password" required>
    <label for="new_password2">确认新密码</label>
    <input id="new_password2" type="password" autocomplete="new-password" required>
    <button type="submit" id="submit-btn">保存并继续</button>
  </form>
  <a class="back" href="login.html" id="logout-link">退出重新登录</a>
</div>
<script src="js/api-base.js"></script>
<script src="js/auth.js?v=20260622-llm"></script>
<script>
(function () {
  var form = document.getElementById('pwd-form');
  var err = document.getElementById('err');
  var ok = document.getElementById('ok');
  var btn = document.getElementById('submit-btn');
  var next = new URLSearchParams(window.location.search).get('next') || 'index.html';

  SandAuth.fetchMe().then(function (user) {
    if (!user) {
      window.location.href = 'login.html?next=' + encodeURIComponent('change-password.html');
      return;
    }
    if (!user.must_change_password) {
      document.getElementById('hint').textContent = '修改登录密码（至少 8 位，含字母与数字）。';
    }
  });

  document.getElementById('logout-link').addEventListener('click', function (e) {
    e.preventDefault();
    SandAuth.logout().then(function () { window.location.href = 'login.html'; });
  });

  form.addEventListener('submit', function (e) {
    e.preventDefault();
    err.textContent = '';
    ok.textContent = '';
    var oldPwd = document.getElementById('old_password').value;
    var newPwd = document.getElementById('new_password').value;
    var newPwd2 = document.getElementById('new_password2').value;
    if (newPwd !== newPwd2) {
      err.textContent = '两次新密码不一致';
      return;
    }
    btn.disabled = true;
    SandAuth.changePassword(oldPwd, newPwd)
      .then(function () {
        ok.textContent = '密码已更新，正在跳转…';
        setTimeout(function () { window.location.href = next; }, 600);
      })
      .catch(function (ex) { err.textContent = ex.message || '修改失败'; })
      .finally(function () { btn.disabled = false; });
  });
})();
</script>
</body>
</html>
