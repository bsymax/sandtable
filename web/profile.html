<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>品牌档案 · 品牌沙盘</title>
<style>
:root {
  --bg:#f4f5f9; --card-bg:#fff; --text:#1a1f36; --text-secondary:#697386; --text-muted:#a3acba;
  --border:#e3e8ee; --blue-600:#0066cc; --blue-500:#0d7aff; --blue-50:#e8f2ff;
  --amber-500:#e6a700; --amber-50:#fff8e6; --red-500:#cd3b32; --red-50:#fdecea;
  --green-500:#0e7c4b; --green-50:#e8f5ef; --header-h:56px;
  --font:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
  --shadow-sm:0 1px 2px rgba(0,0,0,.04),0 1px 4px rgba(0,0,0,.06);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:var(--font); background:var(--bg); color:var(--text); min-height:100vh; }
#loading-overlay { position:fixed; inset:0; background:rgba(255,255,255,.85); display:flex; align-items:center; justify-content:center; z-index:9998; flex-direction:column; gap:12px; }
#loading-overlay.hidden { display:none; }
.loading-spinner { width:40px; height:40px; border:3px solid var(--border); border-top-color:var(--blue-500); border-radius:50%; animation:spin .8s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
.topbar { height:var(--header-h); background:#fff; border-bottom:1px solid var(--border); display:flex; align-items:center; padding:0 28px; position:sticky; top:0; z-index:10; }
.breadcrumb { font-size:13px; color:var(--text-secondary); }
.breadcrumb .current { color:var(--text); font-weight:600; }
.topbar-right { margin-left:auto; display:flex; align-items:center; gap:16px; font-size:13px; color:var(--text-secondary); }
.user-avatar { width:32px; height:32px; border-radius:50%; background:#3b82f6; color:#fff; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:600; }
.content { max-width:1200px; margin:0 auto; padding:24px 28px; }
.m1-banner { background:linear-gradient(90deg,#0f172a,#1e3a5f); color:#e2e8f0; padding:10px 16px; border-radius:8px; font-size:12px; margin-bottom:16px; line-height:1.6; }
.m1-banner strong { color:#93c5fd; }
.m1-scope-tag { display:inline-block; background:#3b82f6; color:#fff; font-size:10px; font-weight:700; padding:2px 8px; border-radius:4px; margin-right:8px; }
.page-title { font-size:20px; font-weight:700; margin-bottom:4px; }
.page-subtitle { font-size:13px; color:var(--text-secondary); margin-bottom:20px; }
.tab-bar { display:flex; gap:0; border-bottom:1px solid var(--border); }
.tab-item { padding:12px 20px; font-size:13px; cursor:pointer; color:var(--text-secondary); border-bottom:2px solid transparent; transition:all .15s; }
.tab-item:hover { color:var(--text); }
.tab-item.active { color:var(--blue-600); border-bottom-color:var(--blue-600); font-weight:600; }
#profile-tabs { background:#eef1f6; border-radius:8px 8px 0 0; padding:6px 10px 0; gap:2px; margin-bottom:0; }
#profile-tabs .tab-item { border-radius:6px 6px 0 0; margin-bottom:-1px; border-bottom:none; }
#profile-tabs .tab-item:hover:not(.active) { background:rgba(255,255,255,.55); }
#profile-tabs .tab-item.active { background:#d4e2f2; border-bottom-color:var(--blue-600); }
.profile-brand-shell { background:#fff; border:1px solid var(--border); border-radius:0 0 8px 8px; overflow:hidden; }
.profile-top-bar { display:grid; grid-template-columns:auto 72px 1fr; gap:12px 20px; align-items:center; padding:18px 20px; background:linear-gradient(135deg,#f8fafd,#fff 60%); border-bottom:1px solid var(--border); position:sticky; top:0; z-index:5; }
@media (max-width:900px) { .profile-top-bar { grid-template-columns:1fr; } }
.profile-brand-name { font-size:22px; font-weight:700; margin-right:10px; display:inline; }
.profile-top-left { display:flex; align-items:center; flex-wrap:wrap; gap:8px; }
.profile-top-meta { grid-column:1/-1; font-size:12px; color:var(--text-secondary); display:flex; gap:16px; flex-wrap:wrap; }
.level-badge { display:inline-block; padding:2px 8px; border-radius:3px; font-size:11px; font-weight:700; }
.level-s { background:#fef3c7; color:#92400e; border:1px solid #fcd34d; }
.level-a { background:#e0e7ff; color:#3730a3; border:1px solid #a5b4fc; }
.level-b { background:#f0f1f5; color:#4b5563; border:1px solid #d1d5db; }
.profile-inner-tabs { margin:0; border-bottom:1px solid var(--border); background:#fafbfc; padding:0 12px; }
.profile-inner-tabs .tab-item { padding:12px 16px; }
.profile-panels { padding:20px; }
.profile-pane { display:none; }
.profile-pane.active { display:block; }
.profile-kpi-row { display:grid; grid-template-columns:repeat(6,1fr); gap:12px; margin-bottom:20px; }
@media (max-width:1100px) { .profile-kpi-row { grid-template-columns:repeat(3,1fr); } }
@media (max-width:640px) { .profile-kpi-row { grid-template-columns:repeat(2,1fr); } }
.profile-kpi-card { background:#fff; border:1px solid var(--border); border-radius:8px; padding:14px 16px; box-shadow:var(--shadow-sm); }
.profile-kpi-card.clickable { cursor:pointer; transition:box-shadow .15s,border-color .15s; }
.profile-kpi-card.clickable:hover { border-color:var(--blue-500); box-shadow:0 4px 12px rgba(0,0,0,.08); }
.profile-kpi-card.gap-alert { border-left:3px solid var(--red-500); }
.kpi-label { font-size:10px; color:var(--text-secondary); margin-bottom:6px; }
.kpi-value { font-size:26px; font-weight:700; line-height:1.2; }
.kpi-sub { font-size:11px; margin-top:6px; display:block; }
.kpi-sub.up { color:var(--green-500); }
.kpi-sub.down { color:var(--red-500); }
.card { background:var(--card-bg); border-radius:8px; border:1px solid var(--border); box-shadow:var(--shadow-sm); margin-bottom:16px; }
.card-header { padding:14px 18px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px; }
.card-header h3 { font-size:14px; font-weight:600; }
.card-header .card-meta { font-size:11px; color:var(--text-muted); margin-left:auto; }
.demo-data-badge { display:inline-block; margin-left:6px; padding:1px 6px; font-size:10px; font-weight:600; color:#b45309; background:#fef3c7; border-radius:4px; vertical-align:middle; }
.card-body { padding:18px; }
.card-body.no-padding { padding:0; }
table { width:100%; border-collapse:collapse; font-size:13px; }
table th { text-align:left; padding:10px 16px; background:#f8f9fc; border-bottom:2px solid var(--border); font-weight:600; font-size:12px; color:var(--text-secondary); }
table td { padding:10px 16px; border-bottom:1px solid var(--border); }
table tr:hover td { background:#f8fafd; }
table td.warn-cell { background:var(--amber-50); }
table tr.jd-row td { background:var(--blue-50); }
.tag { display:inline-block; padding:2px 8px; border-radius:4px; font-size:11px; font-weight:600; }
.tag-red { background:var(--red-50); color:var(--red-500); }
.tag-amber { background:var(--amber-50); color:var(--amber-500); }
.tag-green { background:var(--green-50); color:var(--green-500); }
.tag-blue { background:var(--blue-50); color:var(--blue-500); }
.tag-gray { background:#f0f1f5; color:#4b5563; }
.profile-intro-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
@media (max-width:900px) { .profile-intro-grid { grid-template-columns:1fr; } }
.profile-basic-dl { display:grid; grid-template-columns:88px 1fr; gap:8px 12px; font-size:13px; }
.profile-basic-dl dt { color:var(--text-secondary); }
.profile-basic-dl dd { margin:0; }
.intro-basic-box.editing .intro-view { display:none; }
.intro-basic-box.editing .intro-edit { display:block; }
.intro-basic-box .intro-edit { display:none; }
.intro-edit .form-label:first-child { margin-top:0; }
.person-card, .person-card-editable { border:1px solid var(--border); border-radius:8px; padding:12px 14px; margin-bottom:10px; background:#fff; }
.person-card:last-child, .person-card-editable:last-child { margin-bottom:0; }
.profile-expire-warn { font-size:11px; color:var(--red-500); background:var(--red-50); padding:8px 12px; border-radius:6px; margin-top:8px; line-height:1.5; }
.person-head { display:flex; justify-content:space-between; align-items:flex-start; gap:8px; }
.person-name { font-size:14px; font-weight:600; }
.person-role { font-size:12px; color:var(--text-secondary); margin-top:2px; }
.person-tags { margin-top:8px; display:flex; flex-wrap:wrap; gap:6px; }
.person-edit-fields { display:none; margin-top:10px; }
.person-card.editing .person-view { display:none; }
.person-card.editing .person-edit-fields { display:block; }
.form-input, .form-select, .form-textarea { width:100%; padding:8px 12px; border:1px solid var(--border); border-radius:4px; font-size:13px; font-family:var(--font); margin-bottom:8px; }
.form-textarea { resize:vertical; line-height:1.6; min-height:80px; }
.form-label { font-size:12px; font-weight:600; margin-bottom:4px; display:block; }
.org-chart { display:flex; flex-direction:column; align-items:center; padding:16px 0; font-size:12px; }
.org-node { padding:8px 14px; border:1px solid var(--border); border-radius:6px; background:#f8fafd; min-width:120px; text-align:center; margin:4px; }
.org-node.lead { background:var(--blue-50); border-color:#bfdbfe; font-weight:600; }
.org-connector { width:2px; height:14px; background:var(--border); }
.org-row { display:flex; gap:12px; flex-wrap:wrap; justify-content:center; position:relative; }
.org-row::before { content:''; position:absolute; top:0; left:20%; right:20%; height:2px; background:var(--border); }
.org-row .org-node { margin-top:14px; }
.org-branches-row { display:flex; gap:16px; flex-wrap:wrap; justify-content:center; margin-top:4px; }
.org-branch-col { display:flex; flex-direction:column; align-items:center; min-width:110px; max-width:160px; }
.org-branch-title { font-size:11px; font-weight:600; color:var(--text-secondary); padding:4px 8px; border:1px dashed var(--border); border-radius:4px; margin-bottom:6px; text-align:center; }
.org-node.contact-linked { background:#f0f9ff; border-color:#93c5fd; }
.org-node.manual { border-style:dashed; }
.org-node-empty { color:var(--text-muted); font-size:11px; min-width:80px; }
.org-default-label { font-size:11px; color:var(--text-muted); margin:10px 0 4px; text-align:center; }
.org-editor-block { margin:12px 0; padding-top:10px; border-top:1px dashed var(--border); }
.org-editor-row { display:flex; gap:8px; align-items:center; margin-bottom:8px; flex-wrap:wrap; }
.org-editor-row .form-input, .org-editor-row .form-select { margin-bottom:0; flex:1 1 140px; }
.org-editor-row .btn-sm-outline { flex-shrink:0; }
.org-editor-tag { font-size:10px; color:var(--text-muted); white-space:nowrap; }
.org-image-panel { text-align:center; padding:8px 0 12px; }
.org-image { max-width:100%; max-height:420px; border:1px solid var(--border); border-radius:8px; background:#fff; }
.org-image-meta { font-size:11px; color:var(--text-muted); margin-top:6px; }
.org-image-preview { margin-bottom:10px; text-align:center; }
.org-image-preview img { max-width:100%; max-height:200px; border:1px solid var(--border); border-radius:6px; }
.org-diagram-fallback { margin-top:12px; font-size:12px; }
.org-diagram-fallback summary { cursor:pointer; color:var(--blue-600); margin-bottom:8px; }
.org-box.editing .org-view { display:none; }
.org-box.editing .org-edit-fields { display:block; }
.org-edit-fields { display:none; margin-top:8px; }
.contact-new-panel { display:none; margin-top:12px; padding-top:12px; border-top:1px dashed var(--border); }
.contact-new-panel.show { display:block; }
.person-actions { display:flex; gap:6px; flex-shrink:0; }
.profile-rule-item.stale { border-left:3px solid var(--amber-500); background:var(--amber-50); }
.profile-rule-item .rule-meta { font-size:11px; color:var(--text-muted); margin-top:8px; }
.profile-rule-box { border:1px solid var(--border); border-radius:8px; padding:14px; font-size:13px; line-height:1.65; }
.profile-rule-box .rule-meta { font-size:11px; color:var(--text-muted); margin-top:10px; }
.profile-rule-box.editing .rule-view { display:none; }
.profile-rule-box.editing .rule-edit { display:block; }
.profile-rule-box .rule-edit { display:none; }
.profile-health-ring { position:relative; width:72px; height:72px; flex-shrink:0; }
.profile-health-ring svg { transform:rotate(-90deg); }
.profile-health-ring .ring-score { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; font-size:18px; font-weight:700; color:var(--text); }
.profile-health-ring .ring-label { font-size:10px; font-weight:500; color:var(--text-muted); }
.profile-chart-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:16px; }
.profile-chart-box.span-full { grid-column:1 / -1; }
@media (max-width:900px) { .profile-chart-grid { grid-template-columns:1fr; } }
.profile-chart-box { background:#fff; border:1px solid var(--border); border-radius:8px; padding:14px 16px; }
.profile-chart-box h4 { font-size:12px; font-weight:600; color:var(--text-secondary); margin:0 0 12px; }
.profile-chart-sub { font-size:11px; color:var(--text-muted); margin:-8px 0 10px; line-height:1.45; }
.profile-chart-box h4 + .profile-chart-sub { margin-top:-6px; }
.profile-channel-combo table { width:100%; font-size:12px; border-collapse:collapse; }
.profile-channel-combo th, .profile-channel-combo td { padding:8px 10px; border-bottom:1px solid var(--border); text-align:right; }
.profile-channel-combo th:first-child, .profile-channel-combo td:first-child { text-align:left; }
.profile-channel-combo th { font-size:11px; color:var(--text-muted); font-weight:600; background:#fafbfc; }
.profile-channel-combo tr.jd-row td:first-child { color:var(--primary); }
.profile-chart-box h4:only-child { margin-bottom:12px; }
.profile-chart-box h4 + .profile-chart-sub + .profile-chart-canvas { margin-top:0; }
.profile-chart-canvas { position:relative; height:220px; }
.profile-ai-oneline, #profile-ai-blurb { font-size:13px; line-height:1.65; padding:10px 14px; background:var(--blue-50); border:1px solid #bfdbfe; border-radius:8px; grid-column:1/-1; }
.profile-ai-oneline strong, #profile-ai-blurb strong { color:var(--blue-600); }
.profile-ai-blurb-wrap { display:flex; align-items:flex-start; gap:8px; flex-wrap:wrap; }
.profile-ai-blurb-lead { flex-shrink:0; line-height:1.65; }
.profile-ai-blurb-text { flex:1 1 240px; min-width:0; }
.profile-ai-blurb-wrap.is-loading .profile-ai-blurb-text { color:var(--text-muted); }
.profile-ai-blurb-degrade { display:block; font-size:11px; color:#92400e; margin-top:6px; }
.profile-gap-panel { display:none; margin-bottom:16px; border:1px solid #fecaca; background:var(--red-50); border-radius:8px; overflow:hidden; }
.profile-gap-panel.open { display:block; }
.profile-gap-panel .gap-head { padding:10px 14px; font-size:12px; font-weight:600; color:var(--red-500); border-bottom:1px solid #fecaca; }
.profile-gap-panel table { width:100%; font-size:12px; }
.profile-gap-panel th, .profile-gap-panel td { padding:10px 14px; border-bottom:1px solid #fecaca; text-align:left; }
.profile-gap-panel tr:last-child td { border-bottom:none; }
.s4-placeholder-banner { background:var(--amber-50); border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; font-size:13px; color:#92400e; margin-bottom:16px; line-height:1.6; }
.profile-intel-split { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
@media (max-width:800px) { .profile-intel-split { grid-template-columns:1fr; } }
.profile-intel-col h4 { font-size:13px; font-weight:700; margin:0 0 12px; }
.profile-intel-item { padding:12px 14px; border:1px solid var(--border); border-radius:8px; margin-bottom:10px; font-size:12px; line-height:1.55; background:#fff; }
.profile-intel-item.opp { border-left:3px solid var(--green-500); }
.profile-intel-item.risk { border-left:3px solid var(--red-500); }
.profile-intel-item .intel-item-title { font-weight:600; font-size:13px; margin-bottom:4px; }
.profile-intel-item .intel-item-meta { color:var(--text-muted); font-size:11px; margin-top:6px; }
.history-status-bar { display:flex; flex-wrap:wrap; gap:12px 20px; padding:14px 16px; background:#f8fafd; border:1px solid var(--border); border-radius:8px; margin-bottom:16px; font-size:13px; }
.history-status-bar .status-warn { color:var(--red-500); font-weight:600; }
.history-status-bar .status-ok { color:var(--green-500); font-weight:600; }
.visit-alert-banner { background:linear-gradient(135deg,var(--amber-50,#fff8e6),#fff); border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin-bottom:12px; display:flex; align-items:flex-start; gap:12px; }
.profile-timeline { position:relative; padding-left:20px; }
.profile-timeline::before { content:''; position:absolute; left:6px; top:4px; bottom:4px; width:2px; background:var(--border); }
.profile-tl-item { position:relative; padding-bottom:14px; }
.profile-tl-item:last-child { padding-bottom:0; }
.profile-tl-item::before { content:''; position:absolute; left:-17px; top:4px; width:8px; height:8px; border-radius:50%; background:var(--blue-500); border:2px solid #fff; box-shadow:0 0 0 1px var(--blue-500); }
.profile-tl-item.warn::before { background:var(--amber-500); box-shadow:0 0 0 1px var(--amber-500); }
.profile-tl-item.risk::before { background:var(--red-500); box-shadow:0 0 0 1px var(--red-500); }
.profile-tl-item.good::before { background:var(--green-500); box-shadow:0 0 0 1px var(--green-500); }
.profile-tl-item .tl-time { font-size:11px; color:var(--text-muted); }
.profile-tl-item .tl-title { font-size:13px; font-weight:600; margin:2px 0; }
.profile-tl-item .tl-desc { font-size:12px; color:var(--text-secondary); line-height:1.5; }
.profile-tl-details summary { font-size:11px; color:var(--blue-500); cursor:pointer; margin-top:4px; }
.profile-tl-details .tl-full { font-size:12px; color:var(--text-secondary); margin-top:6px; line-height:1.6; }
.visit-suggest-ai { margin-top:16px; padding:16px 18px; background:linear-gradient(135deg,#eff6ff,#fff); border:1px solid #bfdbfe; border-radius:10px; }
.visit-suggest-ai h4 { font-size:13px; font-weight:700; color:var(--blue-600); margin:0 0 10px; }
.visit-suggest-ai ul { margin:0; padding-left:18px; font-size:13px; line-height:1.7; }
.profile-footer-actions { margin-top:16px; display:flex; gap:8px; flex-wrap:wrap; }
.btn-primary { padding:6px 14px; background:var(--blue-500); color:#fff; border:none; border-radius:4px; cursor:pointer; font-size:12px; font-family:var(--font); }
.btn-primary:hover { background:var(--blue-600); }
.btn-sm-outline { padding:4px 10px; font-size:11px; background:#fff; border:1px solid var(--border); border-radius:4px; cursor:pointer; font-family:var(--font); }
.btn-sm-outline:hover { border-color:var(--blue-500); color:var(--blue-600); }
.toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(80px); background:#1a1f36; color:#fff; padding:10px 18px; border-radius:8px; font-size:13px; z-index:9999; opacity:0; transition:all .25s; pointer-events:none; }
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
.error-banner { display:none; padding:12px 16px; background:var(--red-50); border:1px solid #fca5a5; border-radius:8px; color:var(--red-500); font-size:13px; margin-bottom:16px; }
.chart-empty-placeholder { color:var(--text-muted); font-size:12px; padding:40px 0; text-align:center; }

.profile-data-asof.is-pending { background:#f8fafc; border-color:var(--border); color:var(--text-secondary); font-weight:500; }
.profile-readonly-banner { display:none; margin:0 0 12px; padding:10px 14px; font-size:12px; line-height:1.55; color:#1e40af; background:#eff6ff; border:1px solid #bfdbfe; border-radius:8px; }
.profile-readonly-banner.show { display:block; }
.metrics-empty-banner { margin-bottom:12px; padding:10px 14px; font-size:12px; line-height:1.55; color:var(--text-secondary); background:#f8fafc; border:1px dashed var(--border); border-radius:8px; }
.metrics-period-hint { margin:0 0 12px; font-size:12px; line-height:1.55; color:var(--text-secondary); }
.metrics-period-hint strong { color:var(--text); font-weight:600; }
.metrics-period-hint.is-pending { color:var(--text-muted); }
.kpi-value.is-empty { color:var(--text-muted); font-size:22px; font-weight:600; }
.profile-strategy-box { border:1px solid var(--border); border-radius:8px; padding:14px; font-size:13px; line-height:1.65; min-height:120px; }
.profile-strategy-box.editing .strategy-view { display:none; }
.profile-strategy-box.editing .strategy-edit { display:block; }
.profile-strategy-box .strategy-edit { display:none; }
.profile-strategy-box.is-loading .strategy-view { color:var(--text-muted); }
.strategy-source-badge { display:inline-flex; align-items:center; font-size:10px; font-weight:600; padding:2px 8px; border-radius:4px; margin-left:6px; white-space:nowrap; vertical-align:middle; }

function classifyCategoryLayout(jd, tm, tb, dy) {
  var vals = [

    { ch: 'tb', v: tb },
    { ch: 'dy', v: dy }
  ].filter(function(x) { return x.v != null && !isNaN(x.v); });
  if (!vals.length) return { label: '待观察', cls: 'blue' };
  var sorted = vals.slice().sort(function(a, b) { return b.v - a.v; });
  var maxV = sorted[0].v;
  var minV = sorted[sorted.length - 1].v;
  var jdV = jd != null ? jd : null;
  if (jdV == null) return { label: '待观察', cls: 'blue' };
  if (jdV >= maxV - 0.05) return { label: '优势类目', cls: 'green' };
  if (jdV <= minV + 0.05) return { label: '加强追赶', cls: 'amber' };
  if (maxV - jdV >= 10) return { label: '加强追赶', cls: 'amber' };
  return { label: '待观察', cls: 'blue' };
}

function prepareMetricsHistory(history, key, latest) {
  var rows = (history || []).map(function(r) {
    return Object.assign({}, r, { gmv: metricNum(r.gmv) });
  }).filter(function(r) { return r.gmv != null; });
  rows.sort(function(a, b) {
    return String(a.period_value).localeCompare(String(b.period_value));
  });
  if (rows.length >= 2) return rows;

  var trend = DEMO_GMV_TRENDS[key];
  if (!trend) return rows;
  return trend.map(function(gmv, i) {
    var startYear = 2025, startMonth = 6;
    var m = startMonth + i;
    var y = startYear + Math.floor((m - 1) / 12);
    var mo = ((m - 1) % 12) + 1;
    return { period_value: y + '-' + (mo < 10 ? '0' + mo : '' + mo), gmv: gmv };
  });
}

/** 最新月指标可能缺类目 JSON，从近几月历史补齐供图表/表格使用 */
function enrichMetricsFromHistory(metrics, history) {
  if (!metrics && history && history.length) {
    return Object.assign({}, history[history.length - 1]);
  }
  if (!metrics) return null;
  var merged = Object.assign({}, metrics);
  var hist = history || [];
  for (var i = hist.length - 1; i >= 0; i--) {
    var row = hist[i];
    if (!row) continue;
    if (!merged.category_distribution && row.category_distribution) {
      merged.category_distribution = row.category_distribution;
    }
    if (!merged.category_share && row.category_share) {
      merged.category_share = row.category_share;
    }
    if (merged.jd_share == null && row.jd_share != null) merged.jd_share = row.jd_share;
    if (merged.tmall_share == null && row.tmall_share != null) merged.tmall_share = row.tmall_share;
    if (merged.douyin_share == null && row.douyin_share != null) merged.douyin_share = row.douyin_share;
    if (merged.taobao_share == null && row.taobao_share != null) merged.taobao_share = row.taobao_share;
    if (merged.channel_growth_jd == null && row.channel_growth_jd != null) merged.channel_growth_jd = row.channel_growth_jd;
    if (merged.channel_growth_tmall == null && row.channel_growth_tmall != null) merged.channel_growth_tmall = row.channel_growth_tmall;
    if (merged.channel_growth_douyin == null && row.channel_growth_douyin != null) merged.channel_growth_douyin = row.channel_growth_douyin;
    if (merged.channel_growth_taobao == null && row.channel_growth_taobao != null) merged.channel_growth_taobao = row.channel_growth_taobao;
    if (merged.category_distribution && merged.category_share) break;
  }
  return merged;
}

  opts = opts || {};
  var fetchOpts = { method: opts.method || 'GET', headers: profileAuthHeaders() };
  if (opts.body && fetchOpts.method !== 'GET') fetchOpts.body = JSON.stringify(opts.body);
  var base = opts.base != null ? opts.base : API_BASE;
  return fetch(base + path, fetchOpts).then(function(r) {
    return r.json().then(function(data) {
      if (!r.ok) throw new Error(data.detail || '请求失败');
      return data;

  });
}

/** M2 D-J-0：规则版解读（经营 + 情报 + 拜访 → 策略与行动，M3 同 id 换 LLM） */
function buildProfileAiBlurb(data, briefing) {
  var m = data && data.metrics;
  var extra = BRAND_EXTRA[currentKey] || {};
  var rem = gVisitReminder || {};
  var vh = gVisitHistory || { visits: [], records: [], commitments: [] };
  var chunks = [];

  if (m) {
    var gmv = m.gmv != null ? m.gmv : '—';
    var gmvYoy = getGmvYoy(m);
    var volYoy = getSalesVolumeYoy(m);
    var biz = '【经营】本期成交 <strong>' + gmv + ' 万</strong>';
    if (gmvYoy != null) biz += '，同比 ' + (gmvYoy > 0 ? '↑' : gmvYoy < 0 ? '↓' : '') + Math.abs(gmvYoy) + '%';
    if (volYoy != null) biz += '；销量同比 ' + volYoy + '%';
    if (m.jd_share != null) biz += '；JD 市占 ' + m.jd_share + '%';
    chunks.push(biz + '。');
  } else {
    chunks.push('【经营】暂无本期指标，经营看板待数据更新。');
  }

  var riskTitles = [];
  var oppTitles = [];
  if (briefing && briefing.active_alerts) {
    briefing.active_alerts.forEach(function(a) {
      if (a.priority !== 'P0') return;
      var t = a.title || a.description || '';
      if (!t) return;
      if (a.category === '风险预警') riskTitles.push(t);
      else if (a.category === '增长机会') oppTitles.push(t);
    });
  }
  if (!riskTitles.length && extra.risks) {
    extra.risks.slice(0, 2).forEach(function(r) { if (r.title) riskTitles.push(r.title); });
  }
  if (!oppTitles.length && extra.opps) {
    extra.opps.slice(0, 2).forEach(function(o) { if (o.title) oppTitles.push(o.title); });
  }
  var intelBits = [];
  if (riskTitles.length) intelBits.push('风险：' + riskTitles.slice(0, 2).join('、'));
  if (oppTitles.length) intelBits.push('机会：' + oppTitles.slice(0, 2).join('、'));
  if (intelBits.length) chunks.push('【情报】' + intelBits.join('；') + '。');

  var visitBits = [];
  var days = rem.days_since_last_visit;
  if (days != null && days !== 999) {
    var h = extra.history || {};
    var cycle = h.cycle || rem.cycle_days || 28;
    visitBits.push('距上次拜访 <strong>' + days + ' 天</strong>' + (days > cycle ? '（超周期）' : ''));
  }
  var pending = (vh.commitments || []).filter(function(c) { return c.status === 'pending'; });
  if (pending.length) {
    visitBits.push('未兑现承诺 ' + pending.length + ' 项（如「' + truncate(pending[0].content, 18) + '」）');
  }
  var records = (vh.records || []).slice().sort(function(a, b) {
    return String(b.visit_date || '').localeCompare(String(a.visit_date || ''));
  });
  if (records.length) {
    visitBits.push('最近拜访 ' + formatTimelineDate(records[0].visit_date) + '：' + truncate(records[0].topics || '季度对齐', 20));
  } else if (extra.history && extra.history.timeline && extra.history.timeline[0]) {
    var tl0 = extra.history.timeline[0];
    visitBits.push('最近互动 ' + tl0.date + '：' + truncate(tl0.title, 20));
  }
  if (visitBits.length) chunks.push('【拜访】' + visitBits.join('；') + '。');

  var strategies = [];
  if (m && getGmvYoy(m) != null && getGmvYoy(m) < -5) strategies.push('成交同比承压，优先对齐货盘/价格与 618 排期');
  if (m && m.channel_growth_douyin != null && getGmvYoy(m) != null && m.channel_growth_douyin > getGmvYoy(m) + 15) {
    strategies.push('抖音增速显著高于 JD，谈同价同发或搜索专区换资源');
  }
  if (riskTitles.length) strategies.push('优先消化 P0 风险：' + truncate(riskTitles[0], 22));
  if (oppTitles.length && strategies.length < 2) strategies.push('借势增长机会争取楼层/首发资源');
  if (pending.length) strategies.push('先闭环未兑现承诺再谈新要量');
  if (strategies.length) chunks.push('【策略】' + strategies.slice(0, 2).join('；') + '。');

  var actions = [];
  var overdue = days != null && days !== 999 && days > ((extra.history || {}).cycle || 28);
  if (overdue || riskTitles.length) {
    actions.push('<strong>' + (overdue ? 3 : 7) + ' 天内</strong>安排拜访');
  }
  pending.slice(0, 2).forEach(function(c) { actions.push('跟进「' + truncate(c.content, 16) + '」'); });
  if (!actions.length && oppTitles.length) {
    actions.push('带 JD 数据方案拜访，谈「' + truncate(oppTitles[0], 14) + '」');
  }
  if (!actions.length && m && m.p0_gap_count > 0) {
    actions.push('针对 P0 供给缺口谈 SKU 引入');
  }
  if (!actions.length) actions.push('例行维护关系，同步下一档资源排期');
  chunks.push('【行动】' + actions.slice(0, 3).join('；') + '。');

  if (chunks.length <= 1 && extra.ai) return extra.ai;
  return chunks.join(' ');
}

function buildBlurbStateFromData(data, key, briefing) {
  var fallbackHtml = buildProfileAiBlurb(data, briefing);
  if (!isBlurbLlmOn()) {
    return {
      html: fallbackHtml,
      source: 'fallback',
      degradeHint: null,
      isHtml: true
    };
  }
  return {
    html: escapeHtml(BLURB_LOADING_TEXT),
    source: 'loading',
    degradeHint: null,
    isHtml: false
  };
}

function renderProfileAiBlurbShell(data) {
  var state = gBlurbState || buildBlurbStateFromData(data, currentKey, gBriefing);
  var loadingCls = state.source === 'loading' ? ' is-loading' : '';
  var degradeHtml = state.degradeHint
    ? '<span class="profile-ai-blurb-degrade">' + escapeHtml(state.degradeHint) + '</span>'
    : '';
  var bodyHtml = state.isHtml ? state.html : escapeHtml(state.html);
  return '<div id="profile-ai-blurb" class="profile-ai-oneline">' +
    '<div class="profile-ai-blurb-wrap' + loadingCls + '" id="profile-ai-blurb-wrap">' +

function updateBlurbDom() {
  if (!gBlurbState) return;
  var wrap = document.getElementById('profile-ai-blurb-wrap');
  var badge = document.getElementById('profile-ai-blurb-badge');
  var textEl = document.getElementById('profile-ai-blurb-text');
  if (!wrap || !badge || !textEl) return;
  wrap.classList.toggle('is-loading', gBlurbState.source === 'loading');
  badge.innerHTML = strategySourceBadge(gBlurbState.source);
  if (gBlurbState.isHtml) {
    textEl.innerHTML = gBlurbState.html;
  } else {
    textEl.textContent = gBlurbState.html;
  }
  var oldHint = wrap.querySelector('.profile-ai-blurb-degrade');
  if (oldHint) oldHint.remove();
  if (gBlurbState.degradeHint) {
    var hint = document.createElement('span');
    hint.className = 'profile-ai-blurb-degrade';
    hint.textContent = gBlurbState.degradeHint;
    wrap.appendChild(hint);
  }
}

function fetchProfileBlurbAi(key, data, briefing) {
  if (isProfileDevMock()) {
    return new Promise(function(resolve) {
      setTimeout(function() {
        var name = (data.brand && data.brand.name) ? data.brand.name : key;
        resolve({
          blurb: '<strong>【AI 模拟 · ' + escapeHtml(name) + '】</strong> ' + buildProfileAiBlurb(data, briefing),
          source: 'llm'
        });
      }, STRATEGY_MOCK_DELAY_MS);
    });
  }

  var mainBase = (typeof M1_MAIN_API_BASE !== 'undefined' && M1_MAIN_API_BASE) ? M1_MAIN_API_BASE : API_BASE;
  var controller = typeof AbortController !== 'undefined' ? new AbortController() : null;
  var timer = controller ? setTimeout(function() { controller.abort(); }, STRATEGY_API_TIMEOUT_MS) : null;

  return fetch(mainBase + '/api/brands/profile/' + key + '/ai/blurb', {
    method: 'POST',
    headers: profileAuthHeaders(),
    body: '{}',
    signal: controller ? controller.signal : undefined
  }).then(function(r) {
    return r.json().then(function(body) {
      if (!r.ok) throw new Error(body.detail || body.message || 'blurb API 失败');
      return body;
    });
  }).finally(function() {
    if (timer) clearTimeout(timer);
  });
}

function loadProfileBlurbContent(key, data) {
  gBlurbState = buildBlurbStateFromData(data, key, gBriefing);
  updateBlurbDom();

  if (!isBlurbLlmOn()) return Promise.resolve();

  var token = ++gBlurbLoadToken;
  return fetchProfileBlurbAi(key, data, gBriefing).then(function(res) {
    if (token !== gBlurbLoadToken) return;
    var text = res.blurb || res.summary || res.text || '';
    if (text) {
      gBlurbState.html = text;
      gBlurbState.isHtml = text.indexOf('<') >= 0;
    } else {
      gBlurbState.html = buildProfileAiBlurb(data, gBriefing);
      gBlurbState.isHtml = true;
    }
    gBlurbState.source = (res.source === 'llm' || res.source === 'ai') ? 'ai' : 'fallback';
    gBlurbState.degradeHint = null;
    updateBlurbDom();
  }).catch(function(err) {
    if (token !== gBlurbLoadToken) return;
    gBlurbState.html = buildProfileAiBlurb(data, gBriefing);
    gBlurbState.isHtml = true;
    gBlurbState.source = 'fallback';
    gBlurbState.degradeHint = '智能摘要暂不可用，已显示简要分析。';
    updateBlurbDom();
  });
}

function parseJson(str, fallback) {
  if (!str) return fallback;
  try { return JSON.parse(str); } catch (e) { return fallback; }

function fmtDate(d) {
  if (!d) return '—';
  return String(d).slice(0, 10);

function periodChartLabel(period) {
  if (!period) return '';
  var s = String(period);
  var month = s.match(/^(\d{4})-(\d{2})$/);
  if (month) return parseInt(month[2], 10) + '月';
  var w = s.match(/W(\d+)/i);
  if (w) return 'W' + parseInt(w[1], 10);
  return s;
}

/** M4 月频：2026-05 原样；兼容旧 weekly 2026W24 → 2026-W24 */
function formatDataAsOfLabel(period) {
  if (!period) return '—';
  var s = String(period);
  if (/^\d{4}-\d{2}$/.test(s)) return s;
  var m = s.match(/^(\d{4})W(\d{1,2})$/i);
  if (m) {
    var ww = m[2].length === 1 ? '0' + m[2] : m[2];
    return m[1] + '-W' + ww;
  }
  return s;
}

function getLatestPeriodValue(metrics, history) {
  if (metrics && metrics.period_value) return metrics.period_value;
  var hist = history || [];
  if (!hist.length) return null;
  var sorted = hist.slice().sort(function(a, b) {
    return String(a.period_value).localeCompare(String(b.period_value));
  });
  return sorted[sorted.length - 1].period_value;
}

function hasRealMetricsRow(m) {

function hasNumericValues(arr) {
  return arr.some(function(v) { return v != null && !isNaN(Number(v)); });
}

function detectAnomalyFrom(trend) {
  if (!trend || trend.length < 4) return -1;
  var maxIdx = 0, maxVal = trend[0];
  for (var i = 1; i < trend.length - 1; i++) {
    if (trend[i] > maxVal) { maxVal = trend[i]; maxIdx = i; }
  }
  if (trend[trend.length - 1] < maxVal * 0.95 && maxIdx < trend.length - 2) return maxIdx;
  return -1;
}

function buildGmvLineDatasets(trend, anomalyFrom) {
  var n = trend.length;
  var base = { fill: true, tension: 0.3, pointBorderColor: '#fff', pointBorderWidth: 1, spanGaps: false };
  if (anomalyFrom < 0 || anomalyFrom >= n) {
    return [{
      label: 'JD月成交(万)', data: trend, borderColor: '#0d7aff', backgroundColor: 'rgba(13,122,255,0.15)',
      borderWidth: 2, pointRadius: 4, pointBackgroundColor: '#0d7aff'
    }];
  }
  return [
    Object.assign({}, base, {
      label: 'JD月成交(万)', data: trend.map(function(v, i) { return i <= anomalyFrom ? v : null; }),
      borderColor: '#0d7aff', backgroundColor: 'rgba(13,122,255,0.15)', borderWidth: 2,
      pointRadius: trend.map(function(_, i) { return i <= anomalyFrom ? 4 : 0; }),
      pointBackgroundColor: trend.map(function(_, i) { return i <= anomalyFrom ? '#0d7aff' : 'transparent'; })
    }),
    Object.assign({}, base, {
      label: '异常下滑', data: trend.map(function(v, i) { return i >= anomalyFrom ? v : null; }),
      borderColor: '#cd3b32', backgroundColor: 'rgba(205,59,50,0.2)', borderWidth: 2.5,
      pointRadius: trend.map(function(_, i) { return i >= anomalyFrom ? 4 : 0; }),
      pointBackgroundColor: trend.map(function(_, i) { return i >= anomalyFrom ? '#cd3b32' : 'transparent'; })
    })
  ];
}

var chartLightOpts = {
  responsive: true, maintainAspectRatio: false,
  plugins: { legend: { display: false } },
  scales: {
    x: { ticks: { color: '#697386' }, grid: { color: 'rgba(0,0,0,0.04)' } },
    y: { ticks: { color: '#697386' }, grid: { color: 'rgba(0,0,0,0.04)' } }
  }
};

function initCharts(key, metricsHistory, latest) {
  if (typeof Chart === 'undefined') return;
  destroyCharts();
  var history = prepareMetricsHistory(metricsHistory, key, latest);
  var gmvId = 'chart-gmv-' + key;

  if (!history.length) {
    showChartEmpty(gmvId, '暂无成交趋势数据');
  } else {
    var labels = history.map(function(r) { return periodChartLabel(r.period_value); });
    var trend = history.map(function(r) { return r.gmv; });
    var anomalyFrom = detectAnomalyFrom(trend);
    var gmvCtx = document.getElementById(gmvId);
    if (gmvCtx) {
      var gmvOpts = JSON.parse(JSON.stringify(chartLightOpts));
      gmvOpts.scales.y.ticks.callback = function(v) { return v + '万'; };
      chartStore.gmv = new Chart(gmvCtx, {
        type: 'line',
        data: { labels: labels, datasets: buildGmvLineDatasets(trend, anomalyFrom) },
        options: gmvOpts
      });
    }
  }

  if (!latest) {
    showChartEmpty('chart-cat-' + key, '暂无类目分布数据');
    return;
  }

  var catCtx = document.getElementById('chart-cat-' + key);
  var catDist = parseJson(latest.category_distribution, []);
  var catShare = parseJson(latest.category_share, []);
  var catFiltered = filterCategoryDisplay(catDist, catShare);
  var cats = catFiltered.dist.slice().sort(function(a, b) {
    return (b.share || 0) - (a.share || 0);
  }).slice(0, 12);
  if (!cats.length) {
    showChartEmpty('chart-cat-' + key, '暂无类目分布数据');
  } else if (catCtx) {
    var catOpts = JSON.parse(JSON.stringify(chartLightOpts));
    catOpts.scales.y.ticks.callback = function(v) { return v + '%'; };
    chartStore.cat = new Chart(catCtx, {
      type: 'bar',
      data: {
        labels: cats.map(function(c) { return c.name; }),
        datasets: [{
          label: '品牌下类目占比%',
          data: cats.map(function(c) { return c.share; }),
          backgroundColor: ['#0d7aff', '#e6a700', '#64748b', '#0e7c4b', '#cd3b32', '#8b5cf6', '#14b8a6', '#f97316', '#6366f1', '#84cc16', '#ec4899', '#06b6d4'].slice(0, cats.length)
        }]
      },
      options: catOpts
    });
  }
}

function renderCompletenessRing(data) {

    '<circle cx="36" cy="36" r="' + r + '" fill="none" stroke="' + color + '" stroke-width="6" stroke-dasharray="' + c + '" stroke-dashoffset="' + off + '" stroke-linecap="round"/>' +
    '</svg><div class="ring-score">' + pct + '%<span class="ring-label">完整度</span></div></div>';

function loadVisitHistory(key, brandId) {
  var mainBase = (typeof M1_MAIN_API_BASE !== 'undefined' && M1_MAIN_API_BASE) ? M1_MAIN_API_BASE : API_BASE;
  var VC = window.VisitCommon;
  return Promise.all([
    apiReqOptional('/api/brands/' + key + '/reminder', mainBase),
    apiReqOptional('/api/visits?brand_id=' + brandId, mainBase),
    apiReqOptional('/api/records?brand_id=' + brandId + '&limit=20', mainBase),
    apiReqOptional('/api/commitments?brand_id=' + brandId, mainBase)
  ]).then(function(results) {
    gVisitReminder = results[0] || {};
    var rawVisits = results[1] || [];
    var visits = VC && VC.filterVisitsForBrand
      ? VC.filterVisitsForBrand(rawVisits, brandId)
      : filterVisitsForBrand(rawVisits, brandId);
    var commitments = VC && VC.filterCommitmentsForBrand
      ? VC.filterCommitmentsForBrand(results[3] || [], visits)
      : filterCommitmentsForBrand(results[3] || [], visits);
    gVisitHistory = {
      visits: visits,
      records: results[2] || [],
      commitments: commitments
    };
  });
}

function filterVisitsForBrand(visits, brandId) {
  if (brandId == null) return visits || [];
  return (visits || []).filter(function(v) {
    return v.brand_id == null || v.brand_id === brandId;
  });
}

/** 与 visit.html 承诺跟踪一致：承诺归属 visit_id，按当前品牌 visits 筛（兼容 API 未过滤 brand_id） */
function filterCommitmentsForBrand(commitments, visits) {
  var visitIds = {};
  (visits || []).forEach(function(v) {
    if (v && v.id != null) visitIds[v.id] = true;
  });
  return (commitments || []).filter(function(c) {
    return c.visit_id != null && visitIds[c.visit_id];
  });
}

function refreshHistoryTab() {
  if (!gData || !gData.brand) return Promise.resolve();
  return loadVisitHistory(currentKey, gData.brand.id).then(function() {
    var pane = document.getElementById('pane-history');
    if (pane) pane.innerHTML = renderHistoryTab(currentKey, gData.brand);

function loadBrand(key) {
  showLoadingOverlay();
  var mainBase = (typeof M1_MAIN_API_BASE !== 'undefined' && M1_MAIN_API_BASE) ? M1_MAIN_API_BASE : API_BASE;
  return Promise.all([
    apiReq('/api/brands/profile/' + key),
    apiReq('/api/brands/metrics/' + key + '?limit=12'),
    apiReqOptional('/api/intel/briefing/' + key, mainBase)
  ]).then(function(results) {
    gData = results[0];
    gMetricsHistory = (results[1] || []).slice().reverse();
    gData.metrics = enrichMetricsFromHistory(gData.metrics, gMetricsHistory);
    gBriefing = results[2];
    return loadVisitHistory(key, gData.brand.id).then(function() {

function contactOrgLabel(c) {
  var title = (c.title || '').trim();
  if (!title) return c.name;
  var roles = ['总经理', '副总经理', '总监', '副总监', '经理', '主管', '负责人', 'VP'];
  for (var i = 0; i < roles.length; i++) {
    if (title.indexOf(roles[i]) >= 0) return c.name + ' · ' + roles[i];
  }
  if (title.length <= 6) return c.name + ' · ' + title;
  return c.name + ' · ' + title.slice(-4);
}

function newOrgId(prefix) {
  return (prefix || 'n') + Math.random().toString(36).slice(2, 10);
}

function parseOrgStructure(orgStr) {
  var raw = parseJson(orgStr, null) || {};
  var org = {
    root: raw.root || '',
    lead: raw.lead || '',
    branches: [],
    nodes: [],
    image_url: raw.image_url || '',
    image_updated_at: raw.image_updated_at || ''
  };
  (raw.branches || []).forEach(function(b) {
    if (typeof b === 'string') {
      if (b.trim()) org.branches.push({ id: newOrgId('b'), label: b.trim() });
    } else if (b && b.label) {
      org.branches.push({ id: b.id || newOrgId('b'), label: String(b.label).trim() });
    }
  });
  (raw.nodes || []).forEach(function(n) {
    if (typeof n === 'string') {
      if (n.trim()) org.nodes.push({ id: newOrgId('n'), label: n.trim(), contact_id: null, branch_id: null });
    } else if (n && n.label) {
      org.nodes.push({
        id: n.id || newOrgId('n'),
        label: String(n.label).trim(),
        contact_id: n.contact_id != null ? n.contact_id : null,
        branch_id: n.branch_id || null
      });
    }
  });
  return org;
}

function guessContactBranchId(contact, branches) {
  var title = (contact.title || '').trim();
  var role = (contact.role_tag || '').trim();
  var hay = title + ' ' + role;
  if (!hay.trim()) return null;
  var i, b, label, kw;
  for (i = 0; i < branches.length; i++) {
    b = branches[i];
    label = b.label || '';
    if (label && (label.indexOf(title) >= 0 || title.indexOf(label) >= 0 || label.indexOf(role) >= 0 || role.indexOf(label) >= 0)) {
      return b.id;
    }
  }
  var keywords = ['京东', 'JD', '天猫', '淘宝', '抖音', '内容电商', '电商', '市场', '品牌', '财务', '结算', '供应链', '履约'];
  for (i = 0; i < branches.length; i++) {
    label = branches[i].label || '';
    for (var k = 0; k < keywords.length; k++) {
      kw = keywords[k];
      if (label.indexOf(kw) >= 0 && hay.indexOf(kw) >= 0) return branches[i].id;
    }
  }
  return null;
}

function mergeOrgWithContacts(org, contacts) {
  org = JSON.parse(JSON.stringify(org));
  contacts = contacts || [];
  var activeIds = {};
  contacts.forEach(function(c) { activeIds[c.id] = true; });
  org.nodes = org.nodes.filter(function(n) {
    return !n.contact_id || activeIds[n.contact_id];
  });
  var byContact = {};
  org.nodes.forEach(function(n) {
    if (n.contact_id) byContact[n.contact_id] = n;
  });
  contacts.forEach(function(c) {
    var label = contactOrgLabel(c);
    var branchId = guessContactBranchId(c, org.branches);
    if (byContact[c.id]) {
      byContact[c.id].label = label;
      if (branchId) byContact[c.id].branch_id = branchId;
      return;
    }
    var matched = null;
    org.nodes.forEach(function(n) {
      if (n.contact_id || matched) return;
      if ((n.label || '').indexOf(c.name) >= 0) {
        n.contact_id = c.id;
        n.label = label;
        if (branchId) n.branch_id = branchId;
        matched = n;
      }
    });
    if (!matched) {
      org.nodes.push({
        id: newOrgId('n'),
        label: label,
        contact_id: c.id,
        branch_id: branchId
      });
    }
  });
  return org;
}

function renderOrgNodeHtml(node) {

function renderOrgDiagram(org) {
  if (!org.root && !org.lead && !org.nodes.length && !org.branches.length) {
    return '<span style="color:var(--text-muted);">暂无简图节点</span>';
  }
  var html = '<div class="org-chart">';
  if (org.root) {
    html += '<div class="org-node">' + escapeHtml(org.root) + '</div><div class="org-connector"></div>';
  }
  if (org.lead) {
    html += '<div class="org-node lead">' + escapeHtml(org.lead) + '</div>';
  }
  if (org.branches.length) {
    html += '<div class="org-connector"></div><div class="org-branches-row">';
    org.branches.forEach(function(b) {
      var nodes = org.nodes.filter(function(n) { return n.branch_id === b.id; });
      html += '<div class="org-branch-col"><div class="org-branch-title">' + escapeHtml(b.label) + '</div>';
      if (nodes.length) {
        nodes.forEach(function(n) { html += renderOrgNodeHtml(n); });
      } else {
        html += '<div class="org-node org-node-empty">—</div>';
      }
      html += '</div>';
    });
    html += '</div>';
  }
  var defaultNodes = org.nodes.filter(function(n) { return !n.branch_id; });
  if (defaultNodes.length) {
    if (org.branches.length) {
      html += '<div class="org-default-label">基层 / 未归属分支</div>';
    } else if (org.lead || org.root) {
      html += '<div class="org-connector"></div>';
    }
    html += '<div class="org-row">';
    defaultNodes.forEach(function(n) { html += renderOrgNodeHtml(n); });
    html += '</div>';
  }
  html += '</div>';
  return html;
}

function syncOrgEditorFromDom() {
  if (!gOrgEditorState) return null;
  var org = gOrgEditorState;
  org.root = (document.getElementById('org-root') && document.getElementById('org-root').value.trim()) || '';
  org.lead = (document.getElementById('org-lead') && document.getElementById('org-lead').value.trim()) || '';
  var mount = document.getElementById('org-editor-mount');
  if (!mount) return org;
  mount.querySelectorAll('[data-branch-idx]').forEach(function(row) {
    var idx = parseInt(row.getAttribute('data-branch-idx'), 10);
    var input = row.querySelector('[data-org-branch-label]');
    if (org.branches[idx] && input) org.branches[idx].label = input.value.trim();
  });
  mount.querySelectorAll('[data-node-idx]').forEach(function(row) {
    var idx = parseInt(row.getAttribute('data-node-idx'), 10);
    var labelInput = row.querySelector('[data-org-node-label]');
    var branchSelect = row.querySelector('[data-org-node-branch]');
    if (!org.nodes[idx]) return;
    if (!org.nodes[idx].contact_id && labelInput) {
      org.nodes[idx].label = labelInput.value.trim();
    }
    if (branchSelect) {
      org.nodes[idx].branch_id = branchSelect.value || null;
    }
  });
  org.branches = org.branches.filter(function(b) { return b.label; });
  org.nodes = org.nodes.filter(function(n) { return n.label; });
  return org;
}

function escapeHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function isStrategyFieldEmpty(val, placeholder) {
  if (!val || !String(val).trim()) return true;
  var t = String(val).trim();
  if (t === placeholder) return true;
  if (t.indexOf('（待补全') === 0) return true;
  return false;
}

/** M2 旧 seed 单行短文（无【标签】）→ 视为空，走 buildStrategyFallback */
function isLegacyStrategySeed(val) {
  if (!val || !String(val).trim()) return false;
  var t = String(val).trim();
  if (t.indexOf('【') >= 0) return false;
  if (isStrategyFieldEmpty(t)) return false;
  return t.length < 160;
}

function strategyFieldEffectiveEmpty(val, side) {
  var ph = side === 'comp' ? '（待补全竞争格局分析）' : '（待补全增长机会）';
  return isStrategyFieldEmpty(val, ph) || isLegacyStrategySeed(val);
}

/** 竞争格局 / 增长机会 · 保底文案结构（无 LLM 时）；有 LLM 时在此基础上延伸 */
function getStrategyChannelRows(m) {
  if (!m) return [];
  return [
    { name: '京东', share: m.jd_share, growth: channelTableGrowth('JD', m) },
    { name: '天猫', share: m.tmall_share, growth: channelTableGrowth('TM', m) },
    { name: '抖音', share: m.douyin_share, growth: channelTableGrowth('DY', m) },
    { name: '淘宝', share: m.taobao_share, growth: channelTableGrowth('TB', m) }
  ].filter(function(c) { return c.share != null; });
}

function analyzeStrategyCategories(m) {
  var parsed = filterCategoryDisplay(
    parseJson(m && m.category_distribution, []),
    parseJson(m && m.category_share, [])
  );
  var shareMap = {};
  parsed.share.forEach(function(s) { shareMap[s.name] = s; });
  var strong = [];
  var weak = [];
  var growthOpps = [];
  parsed.dist.forEach(function(c) {
    var s = shareMap[c.name] || {};
    var ch = getCategoryChannelPct(s);
    var jdBrandShare = getJdBrandCategoryShare(s);
    var layout = classifyCategoryLayout(ch.jd, ch.tm, ch.tb, ch.dy);
    var item = {
      name: c.name,
      brandShare: c.share,
      jdBrandShare: jdBrandShare,
      ch: ch,
      layout: layout.label
    };
    if (layout.label === '优势类目' || (jdBrandShare != null && jdBrandShare >= 12)) {
      strong.push(item);
    }
    if (layout.label === '加强追赶') {
      weak.push(item);
    }
    var maxNonJd = Math.max(ch.tm || 0, ch.tb || 0, ch.dy || 0);
    var jdWeakInCat = ch.jd != null && maxNonJd > 0 && ch.jd < maxNonJd - 3;
    if (c.share >= 3 && (jdWeakInCat || layout.label === '加强追赶' || (jdBrandShare != null && jdBrandShare < 8))) {
      growthOpps.push(Object.assign({}, item, {
        score: (c.share || 0) - (jdBrandShare || 0) + (jdWeakInCat ? 5 : 0)
      }));
    }
  });
  strong.sort(function(a, b) { return (b.jdBrandShare || 0) - (a.jdBrandShare || 0); });
  weak.sort(function(a, b) { return (b.brandShare || 0) - (a.brandShare || 0); });
  growthOpps.sort(function(a, b) { return b.score - a.score; });
  return { strong: strong, weak: weak, growthOpps: growthOpps };
}

function formatCategoryExamples(items, limit, formatter) {
  if (!items || !items.length) return '';
  return items.slice(0, limit || 3).map(formatter).join('、');
}

function collectIntelAlerts(briefing, extra, category, maxN) {
  var out = [];
  if (briefing && briefing.active_alerts) {
    briefing.active_alerts.forEach(function(a) {
      if (a.category !== category) return;
      if (a.priority !== 'P0' && a.priority !== 'P1') return;
      var t = a.title || truncate(a.description, 48);
      if (t) out.push(t);
    });
  }
  if (category === '风险预警' && !out.length && extra.risks) {
    extra.risks.slice(0, maxN || 2).forEach(function(r) {
      if (r.title) out.push(r.title + (r.body ? '：' + truncate(r.body, 40) : ''));
    });
  }
  if (category === '增长机会' && !out.length && extra.opps) {
    extra.opps.slice(0, maxN || 2).forEach(function(o) {
      if (o.title) out.push(o.title + (o.body ? '：' + truncate(o.body, 40) : ''));
    });
  }
  return out.slice(0, maxN || 2);
}

function strategyActionHint() {

/** D-J-1：库内无文案时，用 metrics + briefing + 类目结构拼规则解读（非 LLM） */
function buildStrategyFallback(data, briefing, key) {
  var m = enrichMetricsFromHistory(data && data.metrics, gMetricsHistory);
  var extra = BRAND_EXTRA[key] || {};
  var compLines = [];
  var oppLines = [];

  if (!m) {
    compLines.push('【解读】暂无本期经营指标，待数据更新后补充各渠道市占、增速与品类格局分析。');
    oppLines.push('【解读】待经营数据更新后，结合渠道增速与品类结构梳理京东侧高增长机会类目。');
    return {
      competitive_landscape: compLines.join('\n'),
      growth_opportunities: oppLines.join('\n')
    };
  }

  var channels = getStrategyChannelRows(m);
  if (channels.length) {
    compLines.push(
      '【渠道市占】本期四渠道市占：' +
      channels.map(function(c) { return c.name + ' ' + c.share + '%'; }).join('、') + '。'
    );
    var byShare = channels.slice().sort(function(a, b) { return b.share - a.share; });
    var shareLeader = byShare[0];
    var jdCh = channels.filter(function(c) { return c.name === '京东'; })[0];
    if (jdCh) {
      var jdLeads = jdCh.share >= shareLeader.share - 0.05;
      compLines.push(
        '【京东地位】京东市占 ' + jdCh.share + '%，' +
        (jdLeads
          ? '为四渠道份额领先'
          : '未达渠道最高（当前领先为' + shareLeader.name + ' ' + shareLeader.share + '%）') + '。'
      );
    }
  }

  var withGrowth = channels.filter(function(c) { return c.growth != null; });
  if (withGrowth.length) {
    compLines.push(
      '【渠道增速】各渠道本期销售增速：' +
      withGrowth.map(function(c) { return c.name + ' ' + fmtPct(c.growth, true); }).join('、') + '。'
    );
    if (withGrowth.length >= 2) {
      var byGrowth = withGrowth.slice().sort(function(a, b) { return b.growth - a.growth; });
      var gLeader = byGrowth[0];
      var gWeak = byGrowth[byGrowth.length - 1];
      compLines.push(
        '【增速对比】增速领先为' + gLeader.name + '（' + fmtPct(gLeader.growth, true) + '），' +
        '增速偏弱为' + gWeak.name + '（' + fmtPct(gWeak.growth, true) + '）。'
      );
    }
  }

  var cat = analyzeStrategyCategories(m);
  if (cat.strong.length) {
    compLines.push(
      '【品类强势】京东侧优势品类示例：' +
      formatCategoryExamples(cat.strong, 3, function(c) {
        return c.name + (c.jdBrandShare != null ? '（JD品类占比' + c.jdBrandShare + '%）' : '');
      }) + '。'
    );
  }
  if (cat.weak.length) {
    compLines.push(
      '【品类弱势】仍有提升空间示例：' +
      formatCategoryExamples(cat.weak, 3, function(c) {
        var jdInCat = c.ch.jd != null ? '，品类内京东占比' + c.ch.jd + '%' : '';
        return c.name + (c.jdBrandShare != null ? '（JD品类占比' + c.jdBrandShare + '%' + jdInCat + '）' : '');
      }) + '，可重点追赶京东侧渗透。'
    );
  }

  var riskIntel = collectIntelAlerts(briefing, extra, '风险预警', 1);
  if (riskIntel.length) {
    compLines.push('【情报】' + riskIntel[0] + '，需关注竞对动作与渠道资源倾斜。');
  }

  if (!compLines.length) {
    compLines.push('【解读】结合品类格局与渠道市占，关注主要竞对在同品类的 JD/站外动作；可编辑保存为正式竞争分析。');
  }

  var fastChannels = channels.filter(function(c) {
    return c.growth != null && c.growth >= 10 && c.name !== '京东';
  }).map(function(c) { return c.name; });
  if (cat.growthOpps.length) {
    var oppIntro = fastChannels.length
      ? '结合本期' + fastChannels.join('、') + '等渠道增速较快，'
      : '';
    oppLines.push(
      '【高增长机会类目】' + oppIntro + '以下品类品牌占比较高但京东品类占比/品类内京东占比偏低，属京东侧重点拉升类目：' +
      formatCategoryExamples(cat.growthOpps, 3, function(c) {
        return c.name + '（品牌占比' + c.brandShare + '%，JD品类占比' + (c.jdBrandShare != null ? c.jdBrandShare + '%' : '—') + '）';
      }) + '。'
    );
    oppLines.push('【策略方向】针对上述类目，可考虑' + strategyActionHint() + '，提升京东渠道份额与成交贡献。');
  }

  var oppIntel = collectIntelAlerts(briefing, extra, '增长机会', 2);
  if (oppIntel.length) {
    oppLines.push(
      '【情报结合】' + oppIntel.join('；') +
      '。可借势情报信息推进' + strategyActionHint() + '等资源争取。'
    );
  }

  var p0 = getP0Gaps(key, m);
  if (p0.length) {
    oppLines.push(
      '【供给缺口】P0 缺口 ' + p0.length + ' 项（如「' + p0[0].sku + '」），建议优先引入新品补足供给后再做包销/投放放大。'
    );
  }

  if (!oppLines.length) {
    oppLines.push(
      '【解读】结合渠道增速与品类结构，梳理京东侧可发力类目；可编辑保存为正式机会清单。'
    );
  }

  return {
    competitive_landscape: compLines.join('\n'),
    growth_opportunities: oppLines.join('\n')
  };
}

function buildStrategyStateFromData(data, key) {
  var p = data.profile || {};
  var fb = buildStrategyFallback(data, gBriefing, key || currentKey);
  var brandKey = key || currentKey;

  function sideState(side) {
    if (isStrategyUserEdited(brandKey, side)) {
      return {
        text: side === 'comp' ? p.competitive_landscape : p.growth_opportunities,
        source: 'db',
        needsLlm: false
      };
    }
    var val = side === 'comp' ? p.competitive_landscape : p.growth_opportunities;
    var ph = side === 'comp' ? '（待补全竞争格局分析）' : '（待补全增长机会）';
    if (strategyFieldEffectiveEmpty(val, side)) {
      if (isStrategyLlmOn()) {
        return { text: STRATEGY_LOADING_TEXT, source: 'loading', needsLlm: true };
      }
      return {
        text: side === 'comp' ? fb.competitive_landscape : fb.growth_opportunities,
        source: 'fallback',
        needsLlm: false
      };
    }
    return {
      text: side === 'comp' ? p.competitive_landscape : p.growth_opportunities,
      source: 'stored',
      needsLlm: false
    };
  }

  return {
    comp: sideState('comp'),
    opp: sideState('opp'),
    banner: null,
    degraded: false
  };
}

function updateStrategyDom() {
  if (!gStrategyState) return;
  var pane = document.getElementById('pane-strategy');
  if (!pane) return;

  var compView = document.getElementById('comp-view');
  var oppView = document.getElementById('opp-view');
  var compInput = document.getElementById('comp-input');
  var oppInput = document.getElementById('opp-input');
  var compBox = document.getElementById('comp-box');
  var oppBox = document.getElementById('opp-box');
  var compMeta = document.getElementById('comp-meta');
  var oppMeta = document.getElementById('opp-meta');
  var banner = document.getElementById('strategy-degrade-banner');

  if (compView) {
    compView.textContent = gStrategyState.comp.text;
    if (compInput && !compBox.classList.contains('editing')) compInput.value = gStrategyState.comp.text;
  }
  if (oppView) {
    oppView.textContent = gStrategyState.opp.text;
    if (oppInput && !oppBox.classList.contains('editing')) oppInput.value = gStrategyState.opp.text;
  }
  if (compBox) compBox.classList.toggle('is-loading', gStrategyState.comp.source === 'loading');
  if (oppBox) oppBox.classList.toggle('is-loading', gStrategyState.opp.source === 'loading');
  if (compMeta) {

  }
  if (oppMeta) {
    oppMeta.innerHTML = strategyMetaText(gStrategyState.opp.source, 'opp') + strategySourceBadge(gStrategyState.opp.source);
  }
  if (banner) {
    if (gStrategyState.banner) {
      banner.textContent = gStrategyState.banner;
      banner.classList.add('show');
    } else {
      banner.textContent = '';
      banner.classList.remove('show');
    }
  }
}

function fetchStrategyAi(key, data) {
  if (isProfileDevMock()) {
    return new Promise(function(resolve) {
      setTimeout(function() {
        var fb = buildStrategyFallback(data, gBriefing, key);
        resolve({
          competitive_landscape: '【AI 延伸 · ' + (data.brand && data.brand.name ? data.brand.name : key) + ' · 在简要分析基础上】\n' + fb.competitive_landscape,
          growth_opportunities: '【AI 延伸 · 在简要分析基础上】\n' + fb.growth_opportunities,
          source: 'llm',
          cached: false
        });
      }, STRATEGY_MOCK_DELAY_MS);
    });
  }

  var mainBase = (typeof M1_MAIN_API_BASE !== 'undefined' && M1_MAIN_API_BASE) ? M1_MAIN_API_BASE : API_BASE;
  var controller = typeof AbortController !== 'undefined' ? new AbortController() : null;
  var timer = controller ? setTimeout(function() { controller.abort(); }, STRATEGY_API_TIMEOUT_MS) : null;

  return fetch(mainBase + '/api/brands/profile/' + key + '/ai/strategy', {
    method: 'POST',
    headers: profileAuthHeaders(),
    body: '{}',
    signal: controller ? controller.signal : undefined
  }).then(function(r) {
    return r.json().then(function(body) {
      if (!r.ok) throw new Error(body.detail || body.message || 'strategy API 失败');
      return body;
    });
  }).finally(function() {
    if (timer) clearTimeout(timer);
  });
}

function loadStrategyContent(key, data) {
  gStrategyState = buildStrategyStateFromData(data, key);
  updateStrategyDom();

  var needComp = gStrategyState.comp.needsLlm;
  var needOpp = gStrategyState.opp.needsLlm;
  if (!needComp && !needOpp) {
    updateStrategyDom();
    return Promise.resolve();
  }

  var token = ++gStrategyLoadToken;
  return fetchStrategyAi(key, data).then(function(res) {
    if (token !== gStrategyLoadToken) return;
    var fb = buildStrategyFallback(data, gBriefing, key);
    var fromLlm = res.source === 'llm' || res.source === 'ai';
    if (needComp) {
      gStrategyState.comp.text = fromLlm
        ? (res.competitive_landscape || fb.competitive_landscape)
        : fb.competitive_landscape;
      gStrategyState.comp.source = fromLlm ? 'ai' : 'fallback';
    }
    if (needOpp) {
      gStrategyState.opp.text = fromLlm
        ? (res.growth_opportunities || fb.growth_opportunities)
        : fb.growth_opportunities;
      gStrategyState.opp.source = fromLlm ? 'ai' : 'fallback';
    }
    if (!fromLlm) {
      gStrategyState.degraded = true;
      gStrategyState.banner = res.message || '智能分析暂不可用，已自动显示简要分析。';
    } else {
      gStrategyState.banner = null;
      gStrategyState.degraded = false;
    }
    updateStrategyDom();
  }).catch(function(err) {
    if (token !== gStrategyLoadToken) return;
    var fb = buildStrategyFallback(data, gBriefing, key);
    if (needComp) {
      gStrategyState.comp.text = fb.competitive_landscape;
      gStrategyState.comp.source = 'fallback';
    }
    if (needOpp) {
      gStrategyState.opp.text = fb.growth_opportunities;
      gStrategyState.opp.source = 'fallback';
    }
    gStrategyState.degraded = true;
    gStrategyState.banner = '智能分析暂不可用，已自动显示简要分析。';
    updateStrategyDom();
  });
}

    '<div class="tab-item' + (currentPTab === 'intro' ? ' active' : '') + '" data-ptab="intro">🏢 品牌简介</div>' +
    '<div class="tab-item' + (currentPTab === 'strategy' ? ' active' : '') + '" data-ptab="strategy">⚔️ 竞争与机会</div>' +
    '<div class="tab-item' + (currentPTab === 'intel' ? ' active' : '') + '" data-ptab="intel">📡 最新情报</div>' +

    '<div class="profile-panels">' +

    '<div class="profile-pane' + (currentPTab === 'strategy' ? ' active' : '') + '" id="pane-strategy">' + renderStrategyTab(data) + '</div>' +
    '<div class="profile-pane' + (currentPTab === 'intel' ? ' active' : '') + '" id="pane-intel">' + renderIntelTab(currentKey) + '</div>' +
    '<div class="profile-pane' + (currentPTab === 'history' ? ' active' : '') + '" id="pane-history">' + renderHistoryTab(currentKey, b) + '</div></div>';

  document.querySelectorAll('#profile-inner-tabs .tab-item').forEach(function(tab) {
    tab.onclick = function() {
      currentPTab = this.dataset.ptab;
      document.querySelectorAll('#profile-inner-tabs .tab-item').forEach(function(t) { t.classList.remove('active'); });
      this.classList.add('active');
      document.querySelectorAll('.profile-pane').forEach(function(p) { p.classList.remove('active'); });
      document.getElementById('pane-' + currentPTab).classList.add('active');
      if (currentPTab === 'dashboard') {
        scheduleDashboardCharts();
      }
      if (currentPTab === 'intel') {
        document.getElementById('pane-intel').innerHTML = renderIntelTab(currentKey);
      }
      if (currentPTab === 'history') {
        refreshHistoryTab();
      }
      if (currentPTab === 'strategy') {
        updateStrategyDom();
      }
    };
  });

  if (currentPTab === 'dashboard') {
    scheduleDashboardCharts();
  }
  applyReadOnlyUi();
}

  }).then(function(data) {
    var savedOrg = parseOrgStructure(data.profile && data.profile.org_structure);
    if (org.branches.length && !(savedOrg.branches && savedOrg.branches.length)) {
      showToast('分支未写入成功，请硬刷新页面后重试（Ctrl+Shift+R）');
      return;
    }
    gData = data;
    gOrgEditorState = null;
    currentPTab = 'intro';
    renderBrand(data, { preserveBlurb: true });
    showToast('组织架构已保存' + (savedOrg.branches.length ? '（' + savedOrg.branches.length + ' 个分支）' : ''));
  }).catch(function(e) { showToast('保存失败：' + e.message); });
};

window.editIntro = function() {
  if (profileWriteGuard('编辑品牌简介')) return;
  document.getElementById('intro-basic-box').classList.add('editing');
};
window.cancelIntro = function() {
  var box = document.getElementById('intro-basic-box');
  if (!box || !gData) return;
  box.classList.remove('editing');
  var p = gData.profile || {};
  var b = gData.brand || {};
  document.getElementById('intro-founded').value = p.founded_year || '';
  document.getElementById('intro-hq').value = p.hq || '';
  document.getElementById('intro-positioning').value = p.positioning || '';
  document.getElementById('intro-responsible').value = b.responsible || '';
};
window.saveIntro = function() {
  if (profileWriteGuard('保存品牌简介')) return;
  apiReq('/api/brands/profile/' + currentKey, {
    method: 'PUT',
    body: {
      founded_year: document.getElementById('intro-founded').value.trim(),
      hq: document.getElementById('intro-hq').value.trim(),
      positioning: document.getElementById('intro-positioning').value.trim(),
      responsible: document.getElementById('intro-responsible').value.trim()
    }
  }).then(function(data) {
    gData = data;
    currentPTab = 'intro';
    renderBrand(data, { preserveBlurb: true });
    showToast('品牌简介已保存');
  }).catch(function(e) { showToast('保存失败：' + e.message); });
};

window.editTaboos = function() {
  document.getElementById('taboo-box').classList.add('editing');
};
window.cancelTaboos = function() {
  document.getElementById('taboo-box').classList.remove('editing');
  document.getElementById('taboo-input').value = document.getElementById('taboo-view').textContent;
};
window.saveTaboos = function() {
  if (profileWriteGuard('潜规则保存')) return;
  var text = document.getElementById('taboo-input').value.trim();
  apiReq('/api/brands/profile/' + currentKey, { method:'PUT', body: { taboos: text } }).then(function(data) {
    gData = data;
    currentPTab = 'intro';
    renderBrand(data, { preserveBlurb: true });
    showToast('潜规则已保存');
  }).catch(function(e) { showToast('保存失败：' + e.message); });
};

window.editStrategy = function(which) {
  if (which === 'comp') document.getElementById('comp-box').classList.add('editing');
  if (which === 'opp') document.getElementById('opp-box').classList.add('editing');
};
window.cancelStrategy = function(which) {
  if (which === 'comp') {
    document.getElementById('comp-box').classList.remove('editing');
    document.getElementById('comp-input').value = document.getElementById('comp-view').textContent;
  }
  if (which === 'opp') {
    document.getElementById('opp-box').classList.remove('editing');
    document.getElementById('opp-input').value = document.getElementById('opp-view').textContent;
  }
};
window.saveStrategy = function() {
  if (profileWriteGuard('竞争/机会保存')) return;
  var payload = {
    competitive_landscape: document.getElementById('comp-input').value.trim(),
    growth_opportunities: document.getElementById('opp-input').value.trim()
  };
  apiReq('/api/brands/profile/' + currentKey, { method:'PUT', body: payload }).then(function(data) {
    gStrategyUserEdited[currentKey] = { comp: true, opp: true };
    gData = data;
    gStrategyState = buildStrategyStateFromData(data, currentKey);
    currentPTab = 'strategy';
    renderBrand(data, { preserveBlurb: true });
    showToast('竞争/机会已保存');
  }).catch(function(e) { showToast('保存失败：' + e.message); });
};

function bindProfileBrandTabClicks() {
  document.querySelectorAll('#profile-tabs .tab-item[data-key]').forEach(function(tab) {
    tab.onclick = function() {
      document.querySelectorAll('#profile-tabs .tab-item[data-key]').forEach(function(t) { t.classList.remove('active'); });
      this.classList.add('active');
      currentKey = this.dataset.key;
      currentPTab = 'dashboard';
      loadBrand(currentKey);
    };
  });
}

function renderProfileBrandTabs(brands) {
  var container = document.getElementById('profile-tabs');
  if (!brands || !brands.length) {
    container.innerHTML = '<div class="tab-item" style="cursor:default;color:#999;">无负责品牌</div>';
    visibleBrandTabs = [];
    return;
  }
  visibleBrandTabs = brands.map(function(b) {
    return { key: b.name_key, label: b.name };
  });
  container.innerHTML = visibleBrandTabs.map(function(t) {
    return '<div class="tab-item" data-key="' + t.key + '">' + t.label + '</div>';
  }).join('');
  bindProfileBrandTabClicks();
}

function hideLoadingOverlay() {
  var el = document.getElementById('loading-overlay');
  if (el) el.classList.add('hidden');
}

function showLoadingOverlay() {
  var el = document.getElementById('loading-overlay');
  if (el) el.classList.remove('hidden');
}

function resolveInitialBrandKeys(brands) {
  if (brands && brands.length) {
    return brands.map(function(b) { return b.name_key; });
  }
  return BRAND_TABS.map(function(t) { return t.key; });
}

function renderInitialBrandTabs(brands) {
  if (brands && brands.length) {
    renderProfileBrandTabs(brands);
    return;
  }
  var container = document.getElementById('profile-tabs');
  container.innerHTML = BRAND_TABS.map(function(t) {
    return '<div class="tab-item" data-key="' + t.key + '">' + t.label + '</div>';
  }).join('');
  visibleBrandTabs = BRAND_TABS.slice();
  bindProfileBrandTabClicks();
}

function setActiveProfileTab(key) {
  document.querySelectorAll('#profile-tabs .tab-item[data-key]').forEach(function(tab) {
    tab.classList.toggle('active', tab.dataset.key === key);
  });
}

function initProfilePage() {
  showLoadingOverlay();
  apiReq('/api/brands').then(function(brands) {
    renderInitialBrandTabs(brands);
    var keys = resolveInitialBrandKeys(brands);
    if (!keys.length) {
      showError('当前账号无负责品牌，请联系管理员分配 user_brands');
      hideLoadingOverlay();
      return;
    }
    var params = new URLSearchParams(window.location.search);
    var brandKey = params.get('brand');
    if (brandKey && keys.indexOf(brandKey) !== -1) {
      currentKey = brandKey;
    } else {
      currentKey = keys[0];
      if (brandKey && keys.indexOf(brandKey) === -1) {
        showToast('无权访问该品牌，已显示「' + (visibleBrandTabs[0] && visibleBrandTabs[0].label || keys[0]) + '」');
      }
    }
    setActiveProfileTab(currentKey);
    loadBrand(currentKey);
  }).catch(function() {
    renderInitialBrandTabs(null);
    var keys = resolveInitialBrandKeys(null);
    var params = new URLSearchParams(window.location.search);
    var brandKey = params.get('brand');
    currentKey = brandKey && keys.indexOf(brandKey) !== -1 ? brandKey : keys[0];
    setActiveProfileTab(currentKey);
    loadBrand(currentKey);
  });
}

(function init() {
  initProfilePage();
})();
</script>
<script src="js/shell.js"></script>
</body>
