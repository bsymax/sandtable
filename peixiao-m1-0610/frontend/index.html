<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>企业级AI平台</title>
    <style>
        :root {
            color-scheme: light;
            --primary: #4F46E5;
            --primary-dark: #4338CA;
            --cyan: #06B6D4;
            --bg: #F8FAFC;
            --text: #1E293B;
            --text-secondary: #64748B;
            --white: #FFFFFF;
            --border: #E2E8F0;
            --gradient-start: #4F46E5;
            --gradient-end: #06B6D4;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #F0F4FF 0%, #F8FAFC 30%, #F0FDF4 70%, #EFF6FF 100%);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ========== Navigation ========== */
        .navbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 60px;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(226, 232, 240, 0.6);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 20px;
            font-weight: 700;
            color: var(--text);
            text-decoration: none;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
            font-weight: 800;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 32px;
            list-style: none;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
            transition: color 0.2s;
            white-space: nowrap;
        }

        .nav-links a:hover {
            color: var(--primary);
        }

        .nav-cta {
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            white-space: nowrap;
        }

        .nav-cta:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(79, 70, 229, 0.35);
        }

        /* ========== Hero Section ========== */
        .hero {
            display: flex;
            align-items: center;
            justify-content: space-between;
            min-height: 100vh;
            padding: 100px 60px 60px;
            max-width: 1400px;
            margin: 0 auto;
            gap: 60px;
        }

        .hero-left {
            flex: 0 0 480px;
            max-width: 480px;
        }

        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, rgba(79, 70, 229, 0.1), rgba(6, 182, 212, 0.1));
            border: 1px solid rgba(79, 70, 229, 0.2);
            padding: 8px 16px;
            border-radius: 24px;
            font-size: 13px;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 24px;
            letter-spacing: 0.5px;
        }

        .hero-badge::before {
            content: '✦';
            font-size: 14px;
        }

        .hero-title {
            font-size: 48px;
            font-weight: 800;
            line-height: 1.25;
            color: var(--text);
            margin-bottom: 20px;
            letter-spacing: -0.5px;
        }

        .hero-title .highlight {
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero-desc {
            font-size: 16px;
            line-height: 1.8;
            color: var(--text-secondary);
            margin-bottom: 36px;
        }

        .hero-buttons {
            display: flex;
            gap: 16px;
            margin-bottom: 48px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            color: white;
            border: none;
            padding: 14px 32px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(79, 70, 229, 0.4);
        }

        .btn-outline {
            background: white;
            color: var(--primary);
            border: 2px solid var(--border);
            padding: 14px 32px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-outline:hover {
            border-color: var(--primary);
            background: rgba(79, 70, 229, 0.03);
        }

        .hero-stats {
            display: flex;
            gap: 32px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 800;
            color: var(--text);
            line-height: 1.2;
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .stat-divider {
            width: 1px;
            background: var(--border);
            align-self: stretch;
        }

        /* ========== Hero Right - 3D Canvas ========== */
        .hero-right {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 550px;
            position: relative;
        }

        #three-canvas {
            width: 100%;
            height: 100%;
            min-height: 550px;
        }

        /* ========== Gradient orbs ========== */
        .bg-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.3;
            pointer-events: none;
            z-index: -1;
        }

        .bg-orb-1 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(79, 70, 229, 0.3), transparent);
            top: -100px;
            right: -100px;
        }

        .bg-orb-2 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(6, 182, 212, 0.2), transparent);
            bottom: -50px;
            left: -80px;
        }

        .bg-orb-3 {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.2), transparent);
            top: 50%;
            left: 40%;
        }

        /* ========== Responsive ========== */
        @media (max-width: 1024px) {
            .hero {
                flex-direction: column;
                padding: 120px 32px 40px;
                gap: 40px;
            }

            .hero-left {
                flex: none;
                max-width: 100%;
                text-align: center;
            }

            .hero-stats {
                justify-content: center;
            }

            .hero-buttons {
                justify-content: center;
            }

            .navbar {
                padding: 12px 24px;
            }

            .nav-links {
                display: none;
            }
        }

        @media (max-width: 640px) {
            .hero-title {
                font-size: 32px;
            }

            .hero-stats {
                flex-wrap: wrap;
                gap: 16px;
            }

            .stat-divider {
                display: none;
            }

            .hero-right {
                min-height: 350px;
            }

            #three-canvas {
                min-height: 350px;
            }
        }
    </style>
</head>
<body>

    <!-- Background gradient orbs -->
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>
    <div class="bg-orb bg-orb-3"></div>

    <!-- Navigation -->
    <nav class="navbar">
        <a href="#" class="logo">
            <div class="logo-icon">AI</div>
            <span>智言AI平台</span>
        </a>
        <ul class="nav-links">
            <li><a href="#">产品</a></li>
            <li><a href="#">解决方案</a></li>
            <li><a href="#">行业案例</a></li>
            <li><a href="#">合作伙伴</a></li>
            <li><a href="#">资源中心</a></li>
            <li><a href="#">任务管理</a></li>
        </ul>
        <button class="nav-cta">免费注册</button>
    </nav>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-left">
            <div class="hero-badge">海量模型 · 灵活调用</div>
            <h1 class="hero-title">企业级<span class="highlight">AI平台</span></h1>
            <p class="hero-desc">
                全新一代企业级AI模型服务平台，提供海量模型库与自研工具链，赋能企业智能化转型新篇章。零门槛轻松实现AI应用，高效驱动业务价值增长。
            </p>
            <div class="hero-buttons">
                <button class="btn-primary">免费注册</button>
                <button class="btn-outline">立即体验</button>
            </div>
            <div class="hero-stats">
                <div class="stat-item">
                    <div class="stat-value">1000万+</div>
                    <div class="stat-label">注册开发者</div>
                </div>
                <div class="stat-divider"></div>
                <div class="stat-item">
                    <div class="stat-value">50万+</div>
                    <div class="stat-label">企业用户信赖</div>
                </div>
                <div class="stat-divider"></div>
                <div class="stat-item">
                    <div class="stat-value">99.99%</div>
                    <div class="stat-label">服务稳定性</div>
                </div>
                <div class="stat-divider"></div>
                <div class="stat-item">
                    <div class="stat-value">200+</div>
                    <div class="stat-label">模型品类</div>
                </div>
            </div>
        </div>

        <div class="hero-right">
            <div id="three-canvas"></div>
        </div>
    </section>

    <!-- Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"
            }
        }
    </script>
    <script type="module">
        import * as THREE from 'three';

        const container = document.getElementById('three-canvas');
        const width = container.clientWidth;
        const height = container.clientHeight;

        // Scene, Camera, Renderer
        const scene = new THREE.Scene();

        const camera = new THREE.PerspectiveCamera(45, width / height, 0.1, 100);
        camera.position.set(8, 6, 10);
        camera.lookAt(0, 1.5, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(width, height);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        container.appendChild(renderer.domElement);

        // Lighting
        const ambientLight = new THREE.AmbientLight('#b8c8ff', 0.9);
        scene.add(ambientLight);

        const sunLight = new THREE.DirectionalLight('#ffffff', 1.2);
        sunLight.position.set(10, 15, 8);
        sunLight.castShadow = true;
        sunLight.shadow.mapSize.width = 2048;
        sunLight.shadow.mapSize.height = 2048;
        sunLight.shadow.camera.near = 0.5;
        sunLight.shadow.camera.far = 50;
        sunLight.shadow.camera.left = -15;
        sunLight.shadow.camera.right = 15;
        sunLight.shadow.camera.top = 15;
        sunLight.shadow.camera.bottom = -15;
        sunLight.shadow.bias = -0.0001;
        scene.add(sunLight);

        const fillLight = new THREE.DirectionalLight('#88ccff', 0.5);
        fillLight.position.set(-5, 3, -3);
        scene.add(fillLight);

        const rimLight = new THREE.DirectionalLight('#ffffff', 0.4);
        rimLight.position.set(0, 2, -8);
        scene.add(rimLight);

        // Ground plane (shadow catcher)
        const groundGeo = new THREE.PlaneGeometry(20, 20);
        const groundMat = new THREE.ShadowMaterial({ opacity: 0.15 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -2.8;
        ground.receiveShadow = true;
        scene.add(ground);

        // Materials
        const primaryMat = new THREE.MeshStandardMaterial({
            color: '#4F46E5',
            roughness: 0.2,
            metalness: 0.1,
        });

        const cyanMat = new THREE.MeshStandardMaterial({
            color: '#06B6D4',
            roughness: 0.2,
            metalness: 0.1,
        });

        const lightCyanMat = new THREE.MeshStandardMaterial({
            color: '#22D3EE',
            roughness: 0.15,
            metalness: 0.05,
        });

        const whiteMat = new THREE.MeshStandardMaterial({
            color: '#FFFFFF',
            roughness: 0.3,
            metalness: 0.05,
        });

        const darkMat = new THREE.MeshStandardMaterial({
            color: '#1E293B',
            roughness: 0.3,
            metalness: 0.1,
        });

        const glassMat = new THREE.MeshStandardMaterial({
            color: '#E0E7FF',
            roughness: 0.1,
            metalness: 0.05,
            transparent: true,
            opacity: 0.85,
        });

        const accentMat = new THREE.MeshStandardMaterial({
            color: '#818CF8',
            roughness: 0.15,
            metalness: 0.05,
            emissive: '#4F46E5',
            emissiveIntensity: 0.3,
        });

        // Helper: rounded box
        function createRoundedBox(w, h, d, r, material) {
            const shape = new THREE.Shape();
            const x = -w / 2;
            const y = -h / 2;
            shape.moveTo(x + r, y);
            shape.lineTo(x + w - r, y);
            shape.quadraticCurveTo(x + w, y, x + w, y + r);
            shape.lineTo(x + w, y + h - r);
            shape.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            shape.lineTo(x + r, y + h);
            shape.quadraticCurveTo(x, y + h, x, y + h - r);
            shape.lineTo(x, y + r);
            shape.quadraticCurveTo(x, y, x + r, y);

            const extrudeSettings = { steps: 1, depth: d - r * 2, bevelEnabled: true, bevelThickness: r, bevelSize: r, bevelSegments: 3 };
            const geo = new THREE.ExtrudeGeometry(shape, extrudeSettings);
            geo.translate(0, 0, -d / 2 + r);
            const mesh = new THREE.Mesh(geo, material);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            return mesh;
        }

        // Simple box helper
        function createBox(w, h, d, material, y = 0) {
            const geo = new THREE.BoxGeometry(w, h, d);
            const mesh = new THREE.Mesh(geo, material);
            mesh.position.y = y;
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            return mesh;
        }

        // ========== CENTRAL PLATFORM (Tower) ==========
        const platformGroup = new THREE.Group();
        platformGroup.position.set(0, 0, 0);

        // Base platform - wide
        const base = createBox(3.2, 0.2, 2.4, primaryMat, -2.8);
        platformGroup.add(base);

        // Base platform rim
        const baseRim = createBox(3.35, 0.08, 2.55, cyanMat, -2.66);
        platformGroup.add(baseRim);

        // Main tower body
        const towerBody = createBox(2.2, 2.2, 1.6, glassMat, -1.6);
        platformGroup.add(towerBody);

        // Tower layers (horizontal bands)
        const bandPositions = [-2.2, -1.5, -0.8, -0.1];
        bandPositions.forEach(y => {
            const band = createBox(2.24, 0.06, 1.64, cyanMat, y);
            platformGroup.add(band);
        });

        // Top platform
        const topPlatform = createBox(2.5, 0.15, 1.9, primaryMat, -0.3);
        platformGroup.add(topPlatform);

        const topRim = createBox(2.6, 0.05, 2.0, cyanMat, -0.2);
        platformGroup.add(topRim);

        // Top ornament - small cubes
        const topOrnaments = [
            { x: -0.6, z: 0, s: 0.25 },
            { x: 0.6, z: 0, s: 0.25 },
            { x: 0, z: -0.4, s: 0.2 },
            { x: 0, z: 0.4, s: 0.2 },
        ];
        topOrnaments.forEach(o => {
            const cube = createBox(o.s, o.s, o.s, accentMat, -0.1 + o.s / 2);
            cube.position.x = o.x;
            cube.position.z = o.z;
            platformGroup.add(cube);
        });

        // Top center spire
        const spire = createBox(0.18, 0.6, 0.18, cyanMat, 0.2);
        platformGroup.add(spire);

        // Top sphere
        const sphereGeo = new THREE.SphereGeometry(0.15, 16, 16);
        const sphere = new THREE.Mesh(sphereGeo, accentMat);
        sphere.position.y = 0.55;
        sphere.castShadow = true;
        platformGroup.add(sphere);

        scene.add(platformGroup);

        // ========== DEVICES ==========

        // Laptop (right side)
        const laptopGroup = new THREE.Group();
        laptopGroup.position.set(2.6, -2.3, 0.5);

        // Laptop base
        const laptopBase = createBox(1.4, 0.08, 1.0, darkMat);
        laptopGroup.add(laptopBase);

        // Keyboard area
        const keyboard = createBox(1.1, 0.02, 0.6, new THREE.MeshStandardMaterial({ color: '#334155', roughness: 0.4 }));
        keyboard.position.y = 0.05;
        laptopGroup.add(keyboard);

        // Laptop screen (angled)
        const screenGroup = new THREE.Group();
        screenGroup.position.set(0, 0.04, -0.35);
        screenGroup.rotation.x = -0.35;

        const screenBezel = createBox(1.35, 0.85, 0.06, darkMat);
        screenGroup.add(screenBezel);

        const screenDisplay = createBox(1.15, 0.65, 0.01, new THREE.MeshStandardMaterial({
            color: '#E0F2FE',
            roughness: 0.1,
            emissive: '#BAE6FD',
            emissiveIntensity: 0.6,
        }));
        screenDisplay.position.set(0, 0.03, 0.035);
        screenGroup.add(screenDisplay);

        // Screen content - colorful lines
        for (let i = 0; i < 3; i++) {
            const line = createBox(0.6, 0.03, 0.01,
                new THREE.MeshStandardMaterial({ color: i === 0 ? '#4F46E5' : i === 1 ? '#06B6D4' : '#818CF8', roughness: 0.1, emissive: i === 0 ? '#4F46E5' : i === 1 ? '#06B6D4' : '#818CF8', emissiveIntensity: 0.3 }),
            );
            line.position.set(0, 0.15 - i * 0.1, 0.04);
            screenGroup.add(line);
        }

        laptopGroup.add(screenGroup);
        scene.add(laptopGroup);

        // Phone (left side)
        const phoneGroup = new THREE.Group();
        phoneGroup.position.set(-2.4, -2.2, -0.3);
        phoneGroup.rotation.y = 0.3;

        const phoneBody = createBox(0.55, 1.0, 0.08, darkMat);
        phoneGroup.add(phoneBody);

        const phoneScreen = createBox(0.45, 0.82, 0.01, new THREE.MeshStandardMaterial({
            color: '#F0FDF4',
            roughness: 0.1,
            emissive: '#DCFCE7',
            emissiveIntensity: 0.4,
        }));
        phoneScreen.position.z = 0.045;
        phoneGroup.add(phoneScreen);

        // Phone content dots
        for (let i = 0; i < 2; i++) {
            const dot = new THREE.Mesh(
                new THREE.CylinderGeometry(0.04, 0.04, 0.01, 12),
                accentMat,
            );
            dot.position.set(0, 0.2 - i * 0.15, 0.05);
            phoneGroup.add(dot);
        }

        scene.add(phoneGroup);

        // Tablet (back left)
        const tabletGroup = new THREE.Group();
        tabletGroup.position.set(-1.2, -2.5, -1.8);
        tabletGroup.rotation.y = -0.4;

        const tabletBody = createBox(1.2, 0.08, 1.6, darkMat);
        tabletGroup.add(tabletBody);

        const tabletScreen = createBox(1.05, 0.01, 1.4, new THREE.MeshStandardMaterial({
            color: '#FFF7ED',
            roughness: 0.1,
            emissive: '#FED7AA',
            emissiveIntensity: 0.3,
        }));
        tabletScreen.position.y = 0.05;
        tabletGroup.add(tabletScreen);

        scene.add(tabletGroup);

        // ========== FLOATING ELEMENTS ==========

        // Orbiting rings
        function createRing(radius, material, y, tubeRadius = 0.03) {
            const geo = new THREE.TorusGeometry(radius, tubeRadius, 16, 64);
            const mesh = new THREE.Mesh(geo, material);
            mesh.position.y = y;
            mesh.rotation.x = Math.PI / 2.5;
            mesh.castShadow = true;
            return mesh;
        }

        const ring1 = createRing(2.0, cyanMat, 0.5, 0.04);
        scene.add(ring1);

        const ring2 = createRing(1.5, new THREE.MeshStandardMaterial({
            color: '#818CF8',
            roughness: 0.2,
            metalness: 0.1,
            emissive: '#4F46E5',
            emissiveIntensity: 0.2,
        }), 1.0, 0.025);
        ring2.rotation.x = Math.PI / 3;
        ring2.rotation.z = Math.PI / 4;
        scene.add(ring2);

        const ring3 = createRing(1.3, cyanMat, 3.5, 0.02);
        ring3.rotation.x = Math.PI / 2.2;
        scene.add(ring3);

        // Floating spheres / particles
        const floatingGroup = new THREE.Group();
        const particleData = [
            { x: 2.8, y: 0.5, z: -1.5, r: 0.12, color: '#06B6D4' },
            { x: -2.5, y: 0.8, z: 1.2, r: 0.1, color: '#4F46E5' },
            { x: 1.8, y: 1.8, z: 2.0, r: 0.08, color: '#22D3EE' },
            { x: -1.5, y: 2.2, z: -1.8, r: 0.1, color: '#818CF8' },
            { x: 3.0, y: 3.0, z: 0.5, r: 0.14, color: '#06B6D4' },
            { x: -3.0, y: 0.2, z: -1.0, r: 0.09, color: '#4F46E5' },
            { x: 0.5, y: 3.8, z: -1.2, r: 0.11, color: '#22D3EE' },
            { x: -0.5, y: -1.5, z: 2.5, r: 0.07, color: '#818CF8' },
        ];

        const floatingSpheres = [];
        particleData.forEach(d => {
            const geo = new THREE.SphereGeometry(d.r, 12, 12);
            const mat = new THREE.MeshStandardMaterial({
                color: d.color,
                roughness: 0.15,
                metalness: 0.05,
                emissive: d.color,
                emissiveIntensity: 0.35,
            });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(d.x, d.y, d.z);
            mesh.castShadow = true;
            floatingGroup.add(mesh);
            floatingSpheres.push({ mesh, baseY: d.y, speed: 0.5 + Math.random() * 1.5, amplitude: 0.15 + Math.random() * 0.3, phase: Math.random() * Math.PI * 2 });
        });
        scene.add(floatingGroup);

        // Small floating cubes
        const cubeGroup = new THREE.Group();
        const cubeData = [
            { x: 2.2, y: 1.0, z: 1.8, s: 0.18 },
            { x: -2.0, y: 1.5, z: -1.5, s: 0.14 },
            { x: 1.0, y: 3.2, z: 1.5, s: 0.16 },
            { x: -1.0, y: 3.5, z: -1.0, s: 0.12 },
            { x: 2.5, y: -0.5, z: 2.2, s: 0.1 },
        ];

        const floatingCubes = [];
        cubeData.forEach(d => {
            const geo = new THREE.BoxGeometry(d.s, d.s, d.s);
            const mat = new THREE.MeshStandardMaterial({
                color: '#FFFFFF',
                roughness: 0.15,
                metalness: 0.05,
                emissive: '#4F46E5',
                emissiveIntensity: 0.2,
            });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(d.x, d.y, d.z);
            mesh.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
            mesh.castShadow = true;
            cubeGroup.add(mesh);
            floatingCubes.push({ mesh, baseY: d.y, speed: 0.3 + Math.random() * 1.0, amplitude: 0.2 + Math.random() * 0.4, phase: Math.random() * Math.PI * 2, rotSpeed: 0.3 + Math.random() * 0.7 });
        });
        scene.add(cubeGroup);

        // Connection lines (data flow visualization)
        function createConnectionLine(start, end, color) {
            const points = [new THREE.Vector3(...start), new THREE.Vector3(...end)];
            const geo = new THREE.BufferGeometry().setFromPoints(points);
            const mat = new THREE.LineBasicMaterial({ color, transparent: true, opacity: 0.4, linewidth: 1 });
            const line = new THREE.Line(geo, mat);
            return line;
        }

        const connectionsGroup = new THREE.Group();
        const connections = [
            { s: [2.4, -2.3, 0.5], e: [1.5, -1.5, 0.3], c: '#06B6D4' },
            { s: [-2.4, -2.2, -0.3], e: [-1.5, -1.5, -0.2], c: '#4F46E5' },
            { s: [2.4, -2.3, 0.5], e: [2.8, 0.5, -1.5], c: '#06B6D4' },
            { s: [-2.4, -2.2, -0.3], e: [-2.5, 0.8, 1.2], c: '#4F46E5' },
        ];
        connections.forEach(c => {
            const line = createConnectionLine(c.s, c.e, c.c);
            connectionsGroup.add(line);
        });
        scene.add(connectionsGroup);

        // ========== ANIMATION ==========
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            const t = clock.getElapsedTime();

            // Rotate rings
            ring1.rotation.z += 0.003;
            ring2.rotation.z -= 0.004;
            ring2.rotation.y += 0.002;
            ring3.rotation.z += 0.005;
            ring3.rotation.y += 0.003;

            // Float spheres
            floatingSpheres.forEach(s => {
                s.mesh.position.y = s.baseY + Math.sin(t * s.speed + s.phase) * s.amplitude;
                s.mesh.position.x += Math.cos(t * s.speed * 0.7 + s.phase) * 0.002;
            });

            // Float cubes
            floatingCubes.forEach(c => {
                c.mesh.position.y = c.baseY + Math.sin(t * c.speed + c.phase) * c.amplitude;
                c.mesh.rotation.x += c.rotSpeed * 0.01;
                c.mesh.rotation.y += c.rotSpeed * 0.008;
            });

            // Subtle platform rotation
            platformGroup.rotation.y = Math.sin(t * 0.3) * 0.05;

            // Subtle camera movement
            camera.position.x = 8 + Math.sin(t * 0.2) * 0.5;
            camera.position.y = 6 + Math.cos(t * 0.25) * 0.3;
            camera.lookAt(0, 1.5, 0);

            renderer.render(scene, camera);
        }

        animate();

        // Handle resize
        window.addEventListener('resize', () => {
            const w = container.clientWidth;
            const h = container.clientHeight;
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
            renderer.setSize(w, h);
        });
    </script>

</body>
</html>
